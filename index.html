<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Festa do Vicente · 1 ano</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics-compat.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F1F5F9;--surface:#fff;--surface2:#F8FAFC;--border:#E2E8F0;--border2:#CBD5E1;
  --text:#0F172A;--text2:#475569;--text3:#94A3B8;
  --accent:#6366F1;--accent-bg:#EEF2FF;--accent-bd:#C7D2FE;
  --green:#10B981;--green-bg:#ECFDF5;--green-bd:#6EE7B7;
  --warn:#F59E0B;--warn-bg:#FFFBEB;--warn-bd:#FDE68A;
  --danger:#EF4444;--danger-bg:#FEF2F2;--danger-bd:#FECACA;
  --blue:#3B82F6;--blue-bg:#EFF6FF;--blue-bd:#BFDBFE;
  --pink:#EC4899;--pink-bg:#FDF2F8;--pink-bd:#FBCFE8;
  --sh1:0 1px 3px rgba(0,0,0,.08);--sh2:0 6px 18px rgba(15,23,42,.08);--sh3:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -4px rgba(0,0,0,.05);
  --r:10px;--rs:7px
}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden;overflow-y:auto;-webkit-tap-highlight-color:transparent}
button,input,select,textarea{font-family:inherit}

/* HEADER */
.hdr{background:linear-gradient(135deg,#1E1B4B 0%,#312E81 45%,#4C1D95 100%);border-bottom:none;padding:0 14px;height:54px;display:flex;align-items:center;gap:8px;flex-shrink:0;position:sticky;top:0;z-index:30;overflow-x:auto;box-shadow:0 2px 16px rgba(79,70,229,.4)}
.hdr::-webkit-scrollbar{display:none}
.brand{font-size:15px;font-weight:800;white-space:nowrap;flex-shrink:0;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.25)}
.brand small{font-weight:500;color:rgba(255,255,255,.55);margin-left:3px;font-size:12px}
.sep{flex:1;min-width:6px}
.stats{display:flex;gap:9px;font-size:12px;color:rgba(255,255,255,.65);flex-shrink:0;white-space:nowrap}
.stats b{color:#fff;font-weight:800}
.hdr-acts{display:flex;align-items:center;gap:5px;flex-shrink:0}
.btn{padding:6px 10px;border-radius:var(--rs);border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.12);font-size:12px;font-weight:650;color:rgba(255,255,255,.9);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0;line-height:1;min-height:30px;backdrop-filter:blur(4px)}
.btn:hover{border-color:rgba(255,255,255,.35);background:rgba(255,255,255,.22);color:#fff}
.btn-p{background:#6366F1;border-color:rgba(255,255,255,.3);color:#fff;box-shadow:0 2px 8px rgba(99,102,241,.4)}
.btn-p:hover{background:#4F46E5;border-color:rgba(255,255,255,.4)}
.btn-g{background:#10B981;border-color:rgba(255,255,255,.3);color:#fff;box-shadow:0 2px 8px rgba(16,185,129,.4)}
.btn-g:hover{background:#059669;border-color:rgba(255,255,255,.4)}
.btn-w{background:rgba(245,158,11,.22);border-color:rgba(245,158,11,.4);color:#FDE68A}
.btn-w:hover{background:rgba(245,158,11,.32);color:#FEF3C7}
.bi{width:28px;height:28px;padding:0;display:inline-flex;align-items:center;justify-content:center;font-size:13px;border-radius:var(--rs);border:1px solid transparent;background:transparent;cursor:pointer;color:var(--text3);transition:all .15s;line-height:1;flex-shrink:0}
.bi:hover{background:var(--bg);border-color:var(--border);color:var(--text2)}
.bi.d:hover{background:var(--danger-bg);border-color:var(--danger);color:var(--danger)}
.bi.on{color:var(--pink);background:var(--pink-bg);border-color:var(--pink-bd)}
.sync-st{font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;white-space:nowrap;flex-shrink:0;transition:all .3s}
.sync-st.ok{color:#34D399;background:rgba(16,185,129,.18)}
.sync-st.syncing{color:rgba(255,255,255,.6);background:rgba(255,255,255,.1)}
.sync-st.err{color:#FCA5A5;background:rgba(239,68,68,.18)}
.sync-st.off{display:none}

/* TOP TOOLS */
.tools{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;flex-shrink:0;z-index:20}
.searchbox{position:relative;flex:1;min-width:200px}
.searchbox input{width:100%;height:36px;padding:0 10px 0 32px;border:1.5px solid var(--border);border-radius:999px;background:var(--surface2);outline:none;font-size:13px;color:var(--text);transition:all .15s}
.searchbox input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px var(--accent-bg)}
.searchbox span{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.fsel{height:36px;padding:0 10px;border:1.5px solid var(--border);border-radius:999px;background:var(--surface2);font-size:12px;font-weight:650;color:var(--text2);outline:none;max-width:170px}
.fsel:focus{border-color:var(--accent);background:#fff}
.tbtn{height:36px;padding:0 12px;border:1.5px solid var(--border);border-radius:999px;background:var(--surface2);font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.tbtn:hover{border-color:var(--border2);background:#fff;color:var(--text)}
.segment{display:flex;gap:2px;background:var(--bg);border:1px solid var(--border);border-radius:999px;padding:3px;flex-shrink:0}
.seg{border:0;background:transparent;border-radius:999px;padding:6px 11px;font-size:12px;font-weight:750;color:var(--text2);cursor:pointer;transition:all .15s}
.seg.active{background:#fff;color:var(--accent);box-shadow:var(--sh1)}

/* DASHBOARD */
.dash{background:linear-gradient(180deg,#fff 0%,#F8FAFC 100%);border-bottom:1px solid var(--border);padding:10px 12px 12px;display:none;flex-shrink:0;max-height:270px;overflow:auto}
.dash.open{display:block}
.dash-grid{display:grid;grid-template-columns:repeat(6,minmax(120px,1fr));gap:8px;margin-bottom:10px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px;box-shadow:var(--sh1)}
.kpi-l{font-size:10px;color:var(--text3);font-weight:800;text-transform:uppercase;letter-spacing:.05em}
.kpi-v{font-size:22px;font-weight:800;margin-top:4px;color:var(--text)}
.kpi-s{font-size:11px;color:var(--text2);margin-top:2px}
.dash-row{display:grid;grid-template-columns:1.2fr 1fr;gap:10px}
.panel{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:10px;box-shadow:var(--sh1)}
.panel-title{font-size:12px;font-weight:800;margin-bottom:8px;color:var(--text2);display:flex;justify-content:space-between;gap:8px}
.bar-row{display:grid;grid-template-columns:110px 1fr 34px;gap:8px;align-items:center;margin:6px 0}
.bar-lbl{font-size:11px;font-weight:700;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-bg{height:9px;background:var(--bg);border-radius:999px;overflow:hidden}
.bar-fill{height:100%;border-radius:999px;transition:width .4s ease}
.bar-val{text-align:right;font-size:11px;font-weight:800;color:var(--text2)}
.cat-mini{display:grid;grid-template-columns:1fr auto;gap:6px;padding:5px 0;border-bottom:1px dashed var(--border)}
.cat-mini:last-child{border-bottom:0}
.cat-mini b{font-size:12px}
.cat-mini span{font-size:11px;color:var(--text3)}

/* BOARD */
.board{flex:1;overflow:visible;display:flex;flex-wrap:wrap;align-items:flex-start;gap:10px;padding:12px;-webkit-overflow-scrolling:touch}
.board.filtering .col-body{min-height:100px}

/* COLUMN */
.col{flex:1;min-width:220px;border-radius:var(--r);border:1px solid var(--border);display:flex;flex-direction:column;overflow:visible}
.col-hdr{padding:9px 10px 8px;display:flex;align-items:center;gap:7px;flex-shrink:0}
.col-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.col-name{font-size:13px;font-weight:800;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.col-cnt{font-size:11px;font-weight:800;color:var(--text3);background:rgba(0,0,0,.09);padding:2px 7px;border-radius:999px;flex-shrink:0}
.col-chev{display:none;font-size:11px;color:var(--text3);transition:transform .2s;flex-shrink:0;margin-left:2px}
.col.collapsed .col-chev{transform:rotate(-90deg)}
.col.collapsed .col-body,.col.collapsed .col-ft{display:none}
.col-body{flex:1;overflow-y:visible;padding:6px;display:flex;flex-direction:column;gap:5px;min-height:40px;isolation:isolate}
.col-body.dover{background:var(--accent-bg);outline:2px dashed var(--accent);outline-offset:-3px;border-radius:var(--rs)}
.col-ft{padding:6px;flex-shrink:0}
.btn-ac{width:100%;padding:7px 8px;border:1.5px dashed var(--border2);border-radius:var(--rs);background:transparent;font-size:12px;font-weight:700;color:var(--text3);cursor:pointer;transition:all .15s;text-align:left;display:flex;align-items:center;gap:5px;min-height:36px}
.btn-ac:hover{background:var(--surface);border-color:var(--accent);color:var(--accent)}
.btn-ac.dover-ac{background:var(--accent-bg);border-color:var(--accent);border-style:solid;color:var(--accent)}
.btn-newcol{width:170px;flex-shrink:0;height:42px;border:2px dashed var(--border2);border-radius:var(--r);background:transparent;font-size:12px;font-weight:750;color:var(--text3);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;align-self:flex-start}
.btn-newcol:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}

/* ADULT CARD */
.acard{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:8px 9px;cursor:grab;transition:box-shadow .15s,border-color .15s,background .15s;position:relative;z-index:0;user-select:none;touch-action:none}
.acard:hover{border-color:var(--border2);box-shadow:var(--sh1)}
.acard.dragging{opacity:.4}
.acard.dover-couple{border:2px solid var(--pink);box-shadow:0 0 0 3px var(--pink-bg);background:var(--pink-bg)}
.acard.child-mode{border-color:var(--green-bd)}
.acard.child-hover{border-color:var(--green);box-shadow:0 0 0 3px var(--green-bg);background:var(--green-bg)}
.acard.filtered-out{display:none}
.card-row{display:flex;align-items:center;gap:6px}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:850;color:#fff;flex-shrink:0;letter-spacing:-.5px;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.card-name{font-size:13px;font-weight:800;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-acts{display:none;gap:2px;align-items:center}
.acard:hover .card-acts,.ccard:hover .card-acts{display:flex}
.card-sub{margin-top:4px;padding-left:34px;font-size:11px;color:var(--text3);line-height:1.4}
.card-sub span{color:var(--text2)}
.meta-line{margin-top:5px;padding-left:34px;display:flex;gap:4px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:3px;border-radius:999px;padding:2px 7px;font-size:10.5px;font-weight:800;border:1px solid transparent;line-height:1.35}
.pill-status{cursor:pointer}
.pill-status:hover{filter:brightness(.97);box-shadow:var(--sh1)}
.pill-cat{background:var(--bg);border-color:var(--border);color:var(--text2)}
.move-sel{display:none;margin-top:5px;width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:var(--rs);font-size:11px;color:var(--text2);background:var(--bg);cursor:pointer;outline:none;min-height:30px}

/* FAMILY GROUP */
.fgroup{border:2px solid var(--border2);border-radius:var(--r);overflow:hidden;background:var(--surface);box-shadow:var(--sh1);position:relative;z-index:2;margin:2px 0}
.fgroup.dragging{opacity:.4}
.fgroup-hdr{font-size:11px;font-weight:850;letter-spacing:.02em;padding:7px 10px 5px;display:flex;align-items:center;gap:5px;background:var(--bg);border-bottom:1px solid var(--border);cursor:grab;user-select:none}
.fgroup-hdr small{font-size:9px;color:var(--text3);font-weight:500;margin-left:auto}
.fgroup-parents{display:flex;flex-direction:column;gap:2px;padding:4px;background:#F8FAFC}
.fgroup-parents .acard{z-index:0;box-shadow:none}
.fgroup-parents.has-kids{border-bottom:1px dashed var(--border)}
.fgroup-children{padding:6px 9px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.fgroup-lbl{font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-right:2px;flex-shrink:0}
.chip{display:inline-flex;align-items:center;gap:3px;background:var(--bg);border:1px solid var(--border);border-radius:999px;padding:2px 8px;font-size:11px;color:var(--text2);font-weight:700}
/* Couple group */
.fgroup.is-couple{border-color:var(--pink-bd);box-shadow:0 3px 14px rgba(236,72,153,.14)}
.fgroup.is-couple .fgroup-hdr{background:linear-gradient(to right,var(--pink-bg),#FCE7F3);border-bottom:2px solid var(--pink-bd);color:#BE185D}
.fgroup.is-couple .fgroup-parents{background:#FFF5FB}
/* Family group */
.fgroup.is-family{border-color:var(--accent-bd);box-shadow:0 3px 14px rgba(99,102,241,.1)}
.fgroup.is-family .fgroup-hdr{background:linear-gradient(to right,var(--accent-bg),#E8EDFF);border-bottom:2px solid var(--accent-bd);color:#4338CA}
.fgroup.is-family .fgroup-parents{background:#F5F7FF}

/* CHILD CARD */
.ccard{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:var(--rs);padding:8px 9px;cursor:grab;user-select:none;transition:box-shadow .15s;touch-action:none}
.ccard:hover{box-shadow:var(--sh1)}
.ccard.dragging{opacity:.4}
.child-name{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.child-age{font-size:11px;color:var(--text3)}
.child-parents{font-size:11px;color:var(--text2);margin-top:4px;font-style:italic;line-height:1.4}
.col.chlcol{border-color:var(--green-bd)}
.chlcol .col-hdr{background:linear-gradient(135deg,#ECFDF5,#D1FAE5)}
.chlcol .col-name{color:#059669}
.chlcol .col-cnt{background:rgba(16,185,129,.15);color:#059669}
.empty-col{text-align:center;color:var(--text3);font-size:12px;padding:18px 8px;font-style:italic;background:rgba(255,255,255,.35);border-radius:var(--rs)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;padding:16px}
.overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--surface);border-radius:14px;padding:20px;width:100%;max-width:460px;box-shadow:var(--sh3);transform:scale(.95) translateY(-8px);transition:transform .2s;max-height:calc(100dvh - 32px);overflow-y:auto}
.overlay.open .modal{transform:scale(1) translateY(0)}
.modal-title{font-size:16px;font-weight:850;margin-bottom:14px}
.field{margin-bottom:11px}
.lbl{display:block;font-size:11px;font-weight:850;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.inp,.sel,.txt{width:100%;padding:9px 10px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:14px;color:var(--text);background:#fff;outline:none;transition:border-color .15s;min-height:40px}
.txt{min-height:72px;resize:vertical}
.inp:focus,.sel:focus,.txt:focus{border-color:var(--accent)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-ft{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.modal-ft .btn{min-height:38px;font-size:13px;background:var(--bg);border:1px solid var(--border);color:var(--text2);backdrop-filter:none}
.modal-ft .btn:hover{background:var(--surface2);border-color:var(--border2);color:var(--text)}
.modal-ft .btn-p{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:none}
.modal-ft .btn-p:hover{background:#4F46E5;border-color:#4F46E5;color:#fff}
.colors{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}
.cdot{width:25px;height:25px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border-color .15s,transform .1s;flex-shrink:0}
.cdot:hover{transform:scale(1.12)}
.cdot.sel{border-color:var(--text)}

/* MOBILE */
.fab{display:none;position:fixed;right:16px;bottom:16px;width:54px;height:54px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:28px;font-weight:300;line-height:1;box-shadow:0 8px 22px rgba(99,102,241,.5);cursor:pointer;z-index:150;align-items:center;justify-content:center;transition:transform .15s}
.fab:active{transform:scale(.9)}
.sheet-ov{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:160;opacity:0;pointer-events:none;transition:opacity .2s}
.sheet-ov.open{opacity:1;pointer-events:auto}
.sheet{position:absolute;left:0;right:0;bottom:0;background:var(--surface);border-radius:20px 20px 0 0;padding:10px 14px calc(16px + env(safe-area-inset-bottom));box-shadow:0 -8px 30px rgba(0,0,0,.18);transform:translateY(110%);transition:transform .28s cubic-bezier(.34,1.4,.5,1);display:flex;flex-direction:column;gap:7px}
.sheet-ov.open .sheet{transform:translateY(0)}
.sheet-grab{width:40px;height:4px;border-radius:999px;background:var(--border2);margin:2px auto 8px}
.sheet-btn{display:flex;align-items:center;gap:11px;width:100%;padding:14px;border:1px solid var(--border);border-radius:13px;background:var(--surface);font-size:15px;font-weight:750;color:var(--text);cursor:pointer;text-align:left}
.sheet-btn:active{background:var(--bg)}
.sheet-btn.p{background:var(--accent-bg);border-color:var(--accent-bd);color:var(--accent)}
.sheet-btn.g{background:var(--green-bg);border-color:var(--green-bd);color:#059669}
.sheet-div{height:1px;background:var(--border);margin:3px 0}

#tclone{position:fixed;pointer-events:none;z-index:9999;opacity:.88;transform:scale(1.06);box-shadow:0 12px 32px rgba(0,0,0,.25);border-radius:var(--rs)}
#notif{position:fixed;bottom:16px;right:16px;padding:10px 14px;border-radius:var(--r);color:#fff;font-size:13px;font-weight:750;box-shadow:var(--sh3);z-index:999;transform:translateY(60px);transition:transform .25s cubic-bezier(.34,1.56,.64,1);pointer-events:none;max-width:calc(100vw - 32px)}
#notif.show{transform:translateY(0)}
#notif.ok{background:#0F172A}
#notif.err{background:var(--danger)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:999px}

@media(max-width:980px){
  .dash-grid{grid-template-columns:repeat(3,minmax(110px,1fr))}
  .dash-row{grid-template-columns:1fr}
  .hdr-acts .desktop-only{display:none}
}
@media(max-width:768px){
  :root{--r:10px}
  .hdr{height:48px;padding:0 10px}
  .brand{font-size:13px}
  .brand small{font-size:11px}
  .stats{gap:6px;font-size:11px}
  .hdr-acts{display:none}
  .fab{display:flex}
  .sheet-ov{display:block}
  .tools{padding:7px 8px;gap:5px}
  .searchbox{min-width:100%;order:1}
  .fsel{flex:1;min-width:0;max-width:none}
  .segment{order:4;width:100%}
  .seg{flex:1}
  .dash{max-height:380px}
  .dash-grid{grid-template-columns:repeat(2,minmax(110px,1fr))}
  .dash-row{grid-template-columns:1fr}
  .bar-row{grid-template-columns:90px 1fr 28px}
  .board{flex-direction:column;flex-wrap:nowrap;align-items:stretch;overflow:visible;padding:8px 8px 88px;gap:7px}
  .col{width:100%;max-height:none;min-width:0;flex:none}
  body.dash-open .col{max-height:none}
  .col-hdr{cursor:pointer;padding:10px 12px;user-select:none}
  .col-chev{display:block}
  .col-body{max-height:none;padding:6px}
  .col-ft{padding:6px}
  .btn-newcol{width:100%;height:42px}
  .acard,.ccard{padding:7px 8px}
  .card-name,.child-name{font-size:12px}

const LS_KEY='vp5';
function clone(o){return JSON.parse(JSON.stringify(o))}
function loadLocal(){
  try{

    if(s)return JSON.parse(s);
    const old=localStorage.getItem('vp4');
    if(old){const d=JSON.parse(old);localStorage.setItem(LS_KEY,JSON.stringify(d));return d;}
    return clone(INIT);
  }catch{return clone(INIT);}
}
function migrate(s){
  if(!s||!Array.isArray(s.adults)||!Array.isArray(s.children)||!Array.isArray(s.categories))return clone(INIT);
  s.adults.forEach(a=>{
    if(!a.childrenIds)a.childrenIds=[];
    if(!a.status)a.status='pendente';
    if(!('phone'in a))a.phone='';
    if(!('food'in a))a.food='';
    if(!('notes'in a))a.notes='';
  });
  s.children.forEach(c=>{if(!c.parentIds)c.parentIds=[];});
  return s;
}

// GROUPS
function getGroups(catId){
  const list=S.adults.filter(a=>a.catId===catId);
  const byId=Object.fromEntries(list.map(a=>[a.id,a]));
  const done=new Set(),out=[];
  for(const a of list){
    if(done.has(a.id))continue;
    const stack=[a],members=[];done.add(a.id);
    while(stack.length){
      const cur=stack.pop();members.push(cur);
      if(cur.partnerId&&byId[cur.partnerId]&&!done.has(cur.partnerId)){done.add(cur.partnerId);stack.push(byId[cur.partnerId]);}
      const kids=cur.childrenIds||[];
      if(kids.length){
        for(const b of list){
          if(done.has(b.id))continue;
          if((b.childrenIds||[]).some(k=>kids.includes(k))){done.add(b.id);stack.push(b);}
        }
      }
    }
    const childIds=[...new Set(members.flatMap(m=>m.childrenIds||[]))];
    if(members.length<2&&!childIds.length)out.push({type:'solo',adult:members[0],members:[members[0]],childIds:[]});
    else{
      const isCouple=members.length===2&&members[0].partnerId===members[1].id&&members[1].partnerId===members[0].id;
      out.push({type:'group',members,childIds,isCouple});
    }
  }
  return out;
}
function allGroups(){return S.categories.flatMap(c=>getGroups(c.id).map(g=>({...g,catId:c.id})))}
function groupText(g){
  const members=g.members||[g.adult];
  const kids=(g.childIds||[]).map(childById).filter(Boolean);
  const cat=catById(members[0]?.catId);
  return norm([members.map(a=>a.name).join(' '),members.map(a=>a.phone||'').join(' '),members.map(a=>a.notes||'').join(' '),members.map(a=>a.food||'').join(' '),kids.map(c=>c.name+' '+c.age).join(' '),cat?.name,''].join(' '));
}
function groupVisible(g){
  const members=g.members||[g.adult];
  if(filters.cat!=='all'&&members[0]?.catId!==filters.cat)return false;
  if(filters.status!=='all'&&!members.some(a=>(a.status||'pendente')===filters.status))return false;
  if(filters.q&&!groupText(g).includes(norm(filters.q)))return false;
  return true;
}
function childVisible(c){
  const parents=S.adults.filter(a=>(a.childrenIds||[]).includes(c.id));
  if(filters.cat!=='all'&&!parents.some(a=>a.catId===filters.cat))return false;
  if(filters.status!=='all'&&!parents.some(a=>(a.status||'pendente')===filters.status))return false;
  const txt=norm([c.name,c.age,parents.map(a=>a.name).join(' ')].join(' '));
  if(filters.q&&!txt.includes(norm(filters.q)))return false;
  return true;
}
function hasActiveFilters(){return !!(filters.q||filters.status!=='all'||filters.cat!=='all')}

// RENDER
function renderACard(a){
  const kids=(a.childrenIds||[]).map(childById).filter(Boolean);
  const st=statusInfo(a.status);

  const nHtml=notes.length?`<div class="card-sub">${notes.join(' · ')}</div>`:'';
  const catOpts=S.categories.map(c=>`<option value="${c.id}"${c.id===a.catId?' selected':''}>${esc(c.name)}</option>`).join('');
  return `<div class="acard" id="ac-${a.id}" draggable="true"
    ondragstart="dStart(event,'adult','${a.id}')" ondragend="dEnd()"
    ondragover="acOver(event,'${a.id}')" ondragleave="acLeave(event,'${a.id}')" ondrop="acDrop(event,'${a.id}')">
    <div class="card-row">
      <div class="avatar" style="background:${nameColor(a.name)}">${esc(initials(a.name))}</div>
      <div class="card-name">${esc(a.name)}</div>

        <button class="bi" title="Editar" onclick="editAdult(event,'${a.id}')">✏</button>
        <button class="bi d" title="Remover" onclick="delAdult(event,'${a.id}')">✕</button>
      </div>
    </div>
    <div class="meta-line">
      <span class="pill pill-status" style="background:${st.bg};border-color:${st.bd};color:${st.color}" onclick="cycleStatus(event,'${a.id}')">${st.icon} ${st.label}</span>
    </div>
    ${kHtml}${nHtml}
    <select class="move-sel" onchange="moveAdult(event,'${a.id}')"><option value="">⤴ Mover para...</option>${catOpts}</select>
  </div>`;
}
function renderFGroup(g){
  const hasKids=g.childIds.length>0;
  const label=g.isCouple?(hasKids?'💑 Casal · pais':'💑 Casal'):(hasKids?'👨‍👩‍👧 Família':'👥 Grupo');
  const groupClass=g.isCouple?'is-couple':(hasKids?'is-family':'');
  const chips=g.childIds.map(id=>{const c=childById(id);return c?`<span class="chip">👶 ${esc(c.name)}, ${esc(c.age)}</span>`:''}).join('');
  const kidsRow=hasKids?`<div class="fgroup-children"><span class="fgroup-lbl">Filhos</span>${chips}</div>`:'';
  const mids=g.members.map(m=>m.id).join(',');
  return `<div class="fgroup ${groupClass}" id="fg-${g.members[0].id}">
    <div class="fgroup-hdr" draggable="true" ondragstart="fgroupStart(event,'${mids}')" ondragend="dEnd()">${label}<small>arrastar</small></div>
    <div class="fgroup-parents${hasKids?' has-kids':''}">${g.members.map(m=>renderACard(m)).join('')}</div>
    ${kidsRow}
  </div>`;
}
function renderCol(cat){
  const grps=getGroups(cat.id).filter(groupVisible);
  const allCnt=S.adults.filter(a=>a.catId===cat.id).length;
  const visCnt=grps.reduce((s,g)=>s+(g.members?g.members.length:1),0);
  const body=grps.length?grps.map(g=>g.type==='solo'?renderACard(g.adult):renderFGroup(g)).join(''):`<div class="empty-col">${hasActiveFilters()?'Nenhum resultado':'Arraste convidados aqui'}</div>`;
  const sys=cat.id==='cat0';
  const btns=sys?'':`<button class="bi" onclick="editCat('${cat.id}')" title="Editar">✏</button><button class="bi d" onclick="delCat('${cat.id}')" title="Excluir">✕</button>`;

    <div class="col-body" id="cb-${cat.id}" ondragover="colOver(event,'${cat.id}')" ondragleave="colLeave(event,'${cat.id}')" ondrop="colDrop(event,'${cat.id}')">${body}</div>

  </div>`;
}
function renderStatusCol(st){

  const cnt=S.adults.filter(a=>(a.status||'pendente')===st.id).length;

  </div>`;
}
function renderChildCol(){
  const visible=S.children.filter(childVisible);
  const cards=visible.map(c=>{

function renderDashboard(){

  const confirmed=S.adults.filter(a=>a.status==='confirmado').length;

  const families=allGroups().length;
  const childLinked=S.children.filter(c=>S.adults.some(a=>(a.childrenIds||[]).includes(c.id))).length;
  const noCat=S.adults.filter(a=>a.catId==='cat0').length;
  const statusBars=STATUS.map(st=>{

    const ad=S.adults.filter(a=>a.catId===c.id).length;

    return `<div class="cat-mini"><b style="color:${c.color}">${esc(c.name)}</b><span>${ad}ad · ${kids}cr</span></div>`;

  const pendingNames=S.adults.filter(a=>(a.status||'pendente')==='pendente').slice(0,8).map(a=>a.name).join(', ');

    <div class="kpi"><div class="kpi-l">Pendentes</div><div class="kpi-v" style="color:#B45309">${pending}</div><div class="kpi-s">sem confirmação</div></div>
    <div class="kpi"><div class="kpi-l">Famílias/grupos</div><div class="kpi-v">${families}</div><div class="kpi-s">unidades agrupadas</div></div>
    <div class="kpi"><div class="kpi-l">Crianças vinc.</div><div class="kpi-v">${childLinked}</div><div class="kpi-s">de ${S.children.length} cadastradas</div></div>
    <div class="kpi"><div class="kpi-l">Sem categoria</div><div class="kpi-v" style="color:var(--text3)">${noCat}</div><div class="kpi-s">para classificar</div></div>

    <div class="panel"><div class="panel-title"><span>Confirmação dos adultos</span><span>${confirmed}/${S.adults.length}</span></div>${statusBars}</div>

}

// STATUS DRAG
function statusOver(e,statusId){if(!drag||drag.type==='child')return;e.preventDefault();e.stopPropagation();document.getElementById('sb-'+statusId)?.classList.add('dover')}
function statusLeave(e,statusId){const el=document.getElementById('sb-'+statusId);if(el&&!el.contains(e.relatedTarget))el.classList.remove('dover')}

  else if(drag.type==='group'){drag.ids.forEach(id=>{const a=adultById(id);if(a)a.status=statusId;});}

// MOUSE D&D
function dStart(e,type,id){drag={type,id};e.dataTransfer.effectAllowed='move';setTimeout(()=>{document.getElementById((type==='adult'?'ac-':'cc-')+id)?.classList.add('dragging');if(type==='child')document.querySelectorAll('.acard').forEach(el=>el.classList.add('child-mode'));},0)}
function dEnd(){document.querySelectorAll('.dragging,.child-mode,.child-hover,.dover,.dover-ac,.dover-couple').forEach(el=>el.classList.remove('dragging','child-mode','child-hover','dover','dover-ac','dover-couple'));drag=null}
function btnAcOver(e,catId){if(!drag||drag.type==='child')return;e.preventDefault();e.stopPropagation();e.currentTarget.classList.add('dover-ac')}
function btnAcLeave(e){e.currentTarget.classList.remove('dover-ac')}
function btnAcDrop(e,catId){e.currentTarget.classList.remove('dover-ac');colDrop(e,catId)}
function fgroupStart(e,idsStr){drag={type:'group',ids:idsStr.split(',')};e.dataTransfer.effectAllowed='move';e.stopPropagation();setTimeout(()=>e.target.closest('.fgroup')?.classList.add('dragging'),0)}
function colOver(e,catId){if(!drag||drag.type==='child')return;e.preventDefault();e.stopPropagation();document.getElementById('cb-'+catId)?.classList.add('dover')}
function colLeave(e,catId){const el=document.getElementById('cb-'+catId);if(el&&!el.contains(e.relatedTarget))el.classList.remove('dover')}
function colDrop(e,catId){
  e.preventDefault();e.stopPropagation();if(!drag)return;
  const catName=catById(catId)?.name||'';
  if(drag.type==='adult'){const a=adultById(drag.id);if(a){setAdultCat(a,catId);save();render();notify('Movido para '+catName);}}
  else if(drag.type==='group'){drag.ids.forEach(id=>{const m=adultById(id);if(m)m.catId=catId;});save();render();notify('Grupo movido para '+catName);}
}
function setAdultCat(a,catId){a.catId=catId;if(a.partnerId){const p=adultById(a.partnerId);if(p)p.catId=catId;}}
function acOver(e,aid){
  if(!drag)return;e.preventDefault();e.stopPropagation();
  if(drag.type==='child'){document.querySelectorAll('.child-hover').forEach(el=>el.classList.remove('child-hover'));document.getElementById('ac-'+aid)?.classList.add('child-hover');}
  else if(drag.type==='adult'&&drag.id!==aid){document.querySelectorAll('.dover-couple').forEach(el=>el.classList.remove('dover-couple'));document.getElementById('ac-'+aid)?.classList.add('dover-couple');}
  else if(drag.type==='group'){document.getElementById('ac-'+aid)?.closest('.col-body')?.classList.add('dover');}
}
function acLeave(e,aid){const card=document.getElementById('ac-'+aid);if(card&&!card.contains(e.relatedTarget))card.classList.remove('child-hover','dover-couple')}
function acDrop(e,aid){
  e.preventDefault();e.stopPropagation();if(!drag)return;
  if(drag.type==='child'){linkChild(drag.id,aid);}
  else if(drag.type==='adult'&&drag.id!==aid){
    const a=adultById(drag.id),b=adultById(aid);if(!a||!b)return;
    if(!a.partnerId&&!b.partnerId){if(confirm(`💑 Formar casal: ${a.name} e ${b.name}?`)){a.partnerId=b.id;b.partnerId=a.id;b.catId=a.catId;save();render();notify(`${a.name} e ${b.name} são um casal 💑`);}}
    else{setAdultCat(a,b.catId);save();render();notify(`${a.name} movido(a)`);}
  }else if(drag.type==='group'){const b=adultById(aid);if(b)colDrop(e,b.catId);}
}

// TOUCH D&D
let tD=null,tCl=null,_tdActive=null;
function _tCleanup(){if(_tdActive){document.removeEventListener('touchmove',_tdActive);_tdActive=null;}}
function _tActivate(){
  if(_tdActive)return;
  _tdActive=function(e){
    if(!tD||!tD.active){_tCleanup();return;}
    e.preventDefault();
    const t=e.touches[0];
    if(tCl){tCl.style.top=(t.clientY-tD.oy)+'px';tCl.style.left=(t.clientX-tD.ox)+'px';tCl.style.display='none';}
    const under=document.elementFromPoint(t.clientX,t.clientY);
    if(tCl)tCl.style.display='';
    document.querySelectorAll('.child-hover,.dover,.dover-ac,.dover-couple').forEach(el=>el.classList.remove('child-hover','dover','dover-ac','dover-couple'));
    if(tD.type==='child'){under?.closest('.acard')?.classList.add('child-hover');}
    else{
      const tc=under?.closest('.acard'),tb=under?.closest('.col-body'),bac=under?.closest('.btn-ac');
      if(tD.type==='adult'&&tc&&tc.id!=='ac-'+tD.id)tc.classList.add('dover-couple');
      else if(tb)tb.classList.add('dover');
      else if(bac)bac.classList.add('dover-ac');
    }
  };
  document.addEventListener('touchmove',_tdActive,{passive:false});
}
function _tStart(el,t,tDObj){
  tD=tDObj;
  tD.timer=setTimeout(()=>{
    if(!tD)return;tD.active=true;
    const r=el.getBoundingClientRect();
    tCl=el.cloneNode(true);tCl.id='tclone';
    tCl.style.cssText=`width:${r.width}px;top:${r.top}px;left:${r.left}px`;
    document.body.appendChild(tCl);el.style.opacity='.35';
    tD.ox=t.clientX-r.left;tD.oy=t.clientY-r.top;
    if(tD.type==='child')document.querySelectorAll('.acard').forEach(c=>c.classList.add('child-mode'));
    _tActivate();
  },220);
}
document.addEventListener('touchstart',e=>{
  if(e.touches.length!==1)return;
  const t=e.touches[0];
  const fhdr=e.target.closest('.fgroup-hdr');
  if(fhdr&&!e.target.closest('.bi')){
    const fg=fhdr.closest('.fgroup');if(!fg)return;
    const ids=[...fg.querySelectorAll('.acard')].map(c=>c.id.replace('ac-',''));
    _tStart(fg,t,{type:'group',ids,sx:t.clientX,sy:t.clientY,active:false,card:fg});
    return;
  }
  const card=e.target.closest('.acard,.ccard');
  if(!card||e.target.closest('.bi,.move-sel,.btn-ac,.pill-status'))return;
  const isA=card.classList.contains('acard');
  const id=card.id.replace(isA?'ac-':'cc-','');
  _tStart(card,t,{type:isA?'adult':'child',id,sx:t.clientX,sy:t.clientY,active:false,card});
},{passive:true});
document.addEventListener('touchmove',e=>{
  if(!tD||tD.active)return;
  const t=e.touches[0];
  if(Math.abs(t.clientX-tD.sx)>10||Math.abs(t.clientY-tD.sy)>10){clearTimeout(tD.timer);_tCleanup();tD=null;}
},{passive:true});
document.addEventListener('touchend',e=>{
  _tCleanup();
  if(!tD)return;clearTimeout(tD.timer);
  if(!tD.active){tD=null;return;}
  const t=e.changedTouches[0];
  if(tCl){document.body.removeChild(tCl);tCl=null;}
  if(tD.card)tD.card.style.opacity='';
  const under=document.elementFromPoint(t.clientX,t.clientY);
  const fake={preventDefault:()=>{},stopPropagation:()=>{}};
  if(tD.type==='child'){
    const tc=under?.closest('.acard');if(tc)linkChild(tD.id,tc.id.replace('ac-',''));
  }else{
    const tc=under?.closest('.acard'),tb=under?.closest('.col-body'),bac=under?.closest('.btn-ac');
    const sv=drag;drag=tD;
    if(tD.type==='adult'){
      if(tc&&tc.id!=='ac-'+tD.id)acDrop(fake,tc.id.replace('ac-',''));
      else if(bac){const cid=bac.dataset.cat;if(cid)colDrop(fake,cid);}
      else if(tb){
        if(tb.id.startsWith('sb-'))statusDrop(fake,tb.id.replace('sb-',''));
        else{const cid=tb.id.replace('cb-','');if(cid!=='children')colDrop(fake,cid);}
      }
    }else if(tD.type==='group'){
      if(bac){const cid=bac.dataset.cat;if(cid)colDrop(fake,cid);}
      else if(tb){
        if(tb.id.startsWith('sb-'))statusDrop(fake,tb.id.replace('sb-',''));
        else{const cid=tb.id.replace('cb-','');if(cid!=='children')colDrop(fake,cid);}
      }
    }
    drag=sv;
  }
  document.querySelectorAll('.child-mode,.child-hover,.dover,.dover-ac,.dover-couple').forEach(el=>el.classList.remove('child-mode','child-hover','dover','dover-ac','dover-couple'));
  tD=null;
},{passive:true});

// ACTIONS
function linkChild(cid,aid){const a=adultById(aid),c=childById(cid);if(!a||!c)return;if(!a.childrenIds)a.childrenIds=[];if(!c.parentIds)c.parentIds=[];if(!a.childrenIds.includes(cid))a.childrenIds.push(cid);if(!c.parentIds.includes(aid))c.parentIds.push(aid);save();render();notify(`${c.name} vinculado(a) a ${a.name}`)}
function moveAdult(e,id){const catId=e.target.value;if(!catId)return;const a=adultById(id);if(a){setAdultCat(a,catId);save();render();notify('Movido para '+catById(catId)?.name);}}
function cycleStatus(e,id){e.stopPropagation();const a=adultById(id);if(!a)return;const idx=STATUS.findIndex(s=>s.id===(a.status||'pendente'));a.status=STATUS[(idx+1)%STATUS.length].id;save();render();notify(`${a.name}: ${statusInfo(a.status).label}`)}
function coupleAdult(e,id){
  e.stopPropagation();const a=adultById(id);if(!a)return;
  if(a.partnerId){const p=adultById(a.partnerId);if(confirm(`Desfazer casal de ${a.name}${p?' e '+p.name:''}?`)){if(p)delete p.partnerId;delete a.partnerId;save();render();notify('Casal desfeito');}return;}
  openModal('couple',id);
}
function toggleCol(e,id){
  if(!window.matchMedia('(max-width:768px)').matches)return;
  if(e.target.closest('.bi'))return;
  document.getElementById('col-'+id)?.classList.toggle('collapsed');
}
function delAdult(e,id){e.stopPropagation();const a=adultById(id);if(!a||!confirm(`Remover "${a.name}"?`))return;S.adults=S.adults.filter(x=>x.id!==id);S.adults.forEach(x=>{if(x.partnerId===id)delete x.partnerId;});S.children.forEach(c=>{c.parentIds=(c.parentIds||[]).filter(p=>p!==id);});save();renderAll();notify(`${a.name} removido(a)`)}
function delChild(e,id){e.stopPropagation();const c=childById(id);if(!c||!confirm(`Remover "${c.name}"?`))return;S.children=S.children.filter(x=>x.id!==id);S.adults.forEach(a=>{a.childrenIds=(a.childrenIds||[]).filter(k=>k!==id);});save();renderAll();notify(`${c.name} removido(a)`)}
function delCat(id){if(id==='cat0')return;const cat=catById(id);if(!cat)return;const n=S.adults.filter(a=>a.catId===id).length;if(!confirm(`Excluir "${cat.name}"?${n?`\n${n} adulto(s) vão para Sem Categoria`:''}`))return;S.adults.forEach(a=>{if(a.catId===id)a.catId='cat0';});S.categories=S.categories.filter(c=>c.id!==id);save();renderAll();notify(`"${cat.name}" excluída`)}

function editChild(e,id){e.stopPropagation();openModal('editChild',id)}

  }else if(type==='category'||type==='editCategory'){
    const edit=type==='editCategory';const cat=edit?catById(arg):{name:'',color:PAL[0]};
    ti.textContent=edit?'Editar Categoria':'Nova Categoria';ok.textContent=edit?'Salvar':'Criar';
    const dots=PAL.map(col=>`<div class="cdot${(cat.color||PAL[0])===col?' sel':''}" style="background:${col}" data-c="${col}" onclick="pickColor('${col}')"></div>`).join('');
    bd.innerHTML=`<div class="field"><label class="lbl">Nome</label><input class="inp" id="mi-catname" value="${esc(cat.name||'')}" placeholder="Ex: Amigos do trabalho" autocomplete="off"></div><div class="field"><label class="lbl">Cor</label><div class="colors">${dots}</div><input type="hidden" id="mi-color" value="${cat.color||PAL[0]}"></div>`;
  }
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.querySelector('#mbody .inp')?.focus(),60);
}
function pickColor(c){document.getElementById('mi-color').value=c;document.querySelectorAll('.cdot').forEach(d=>d.classList.toggle('sel',d.dataset.c===c))}
function closeModal(){document.getElementById('overlay').classList.remove('open')}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeModal()}
function confirmModal(){
  const t=mCtx.type;
  if(t==='adult'||t==='editAdult'){
    const name=document.getElementById('mi-name').value.trim(),catId=document.getElementById('mi-cat').value,status=document.getElementById('mi-status').value,phone=document.getElementById('mi-phone').value.trim(),food=document.getElementById('mi-food').value.trim(),notes=document.getElementById('mi-notes').value.trim();
    if(!name){notify('Informe o nome','err');return}
    if(t==='adult'){S.adults.push({id:uid(),name,catId,status,phone,food,notes,childrenIds:[]});notify(`${name} adicionado(a)`);}
    else{const a=adultById(mCtx.arg);if(a)Object.assign(a,{name,catId,status,phone,food,notes});notify('Convidado atualizado');}
    save();closeModal();renderAll();
  }else if(t==='child'||t==='editChild'){
    const name=document.getElementById('mi-name').value.trim(),age=document.getElementById('mi-age').value.trim(),p1=document.getElementById('mi-p1').value,p2=document.getElementById('mi-p2').value;
    if(!name){notify('Informe o nome','err');return}if(!age){notify('Informe a idade','err');return}
    let c;
    if(t==='child'){c={id:uid(),name,age,parentIds:[]};S.children.push(c);notify(`${name} adicionado(a)`);}
    else{c=childById(mCtx.arg);if(!c)return;S.adults.forEach(a=>{a.childrenIds=(a.childrenIds||[]).filter(k=>k!==c.id);});c.name=name;c.age=age;notify('Criança atualizada');}
    const pids=[...new Set([p1,p2].filter(Boolean))];c.parentIds=pids;
    pids.forEach(pid=>{const a=adultById(pid);if(a){if(!a.childrenIds)a.childrenIds=[];if(!a.childrenIds.includes(c.id))a.childrenIds.push(c.id);}});
    save();closeModal();renderAll();
  }else if(t==='couple'){
    const pid=document.getElementById('mi-partner').value;const a=adultById(mCtx.arg),p=adultById(pid);
    if(!a||!p){notify('Selecione um parceiro(a)','err');return}
    a.partnerId=p.id;p.partnerId=a.id;p.catId=a.catId;save();closeModal();render();notify(`${a.name} e ${p.name} são um casal 💑`);
  }else if(t==='category'||t==='editCategory'){
    const name=document.getElementById('mi-catname').value.trim(),color=document.getElementById('mi-color').value;
    if(!name){notify('Informe o nome','err');return}
    if(t==='category'){S.categories.push({id:uid(),name,color});notify(`"${name}" criada`);}
    else{const cat=catById(mCtx.arg);if(cat){cat.name=name;cat.color=color;}notify('Categoria atualizada');}
    save();closeModal();renderAll();
  }
}
document.addEventListener('keydown',e=>{if(!document.getElementById('overlay').classList.contains('open'))return;if(e.key==='Escape')closeModal();else if(e.key==='Enter'&&e.target.tagName!=='SELECT'&&e.target.tagName!=='TEXTAREA')confirmModal();});

// IMPORT / EXPORT
function now(){return new Date().toISOString().slice(0,10)}
function dl(content,mime,filename){const b=new Blob([content],{type:mime});const url=URL.createObjectURL(b);const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url)}
function exportJSON(){dl(JSON.stringify(S,null,2),'application/json',`backup-lista-vicente-${now()}.json`);notify('Backup JSON baixado')}
function downloadTemplate(){
  const rows=[['tipo','nome','idade','categoria','status','whatsapp','restricao_alimentar','observacoes','responsavel_1','responsavel_2'],['adulto','Exemplo Adulto','','Parentes Evelin','confirmado','21 99999-9999','Nenhuma','Confirmou por WhatsApp','',''],['crianca','Exemplo Jr.','5 anos','','','','','','Exemplo Adulto','']];
  const wb=XLSX.utils.book_new(),ws=XLSX.utils.aoa_to_sheet(rows);ws['!cols']=[{wch:10},{wch:24},{wch:12},{wch:22},{wch:14},{wch:18},{wch:24},{wch:28},{wch:24},{wch:24}];
  XLSX.utils.sheet_add_aoa(ws,[[''],['INSTRUÇÕES:','tipo = adulto ou crianca'],['Categorias:',S.categories.map(c=>c.name).join(' | ')],['Status:',STATUS.map(s=>s.id).join(' | ')]],{origin:'A6'});
  XLSX.utils.book_append_sheet(wb,ws,'Convidados');XLSX.writeFile(wb,`modelo-convidados-vicente-${now()}.xlsx`);notify('Modelo Excel baixado')
}
function exportXLSX(){
  const wb=XLSX.utils.book_new();
  const adults=[['nome','categoria','status','whatsapp','restricao_alimentar','observacoes','parceiro','filhos']].concat(S.adults.map(a=>[a.name,catById(a.catId)?.name||'',statusInfo(a.status).label,a.phone||'',a.food||'',a.notes||'',a.partnerId?adultById(a.partnerId)?.name||'':'',(a.childrenIds||[]).map(id=>childById(id)?.name||'').filter(Boolean).join(', ')]));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(adults),'Adultos');
  const children=[['nome','idade','pais']].concat(S.children.map(c=>[c.name,c.age,S.adults.filter(a=>(a.childrenIds||[]).includes(c.id)).map(a=>a.name).join(' e ')]));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(children),'Crianças');
  const summary=[['indicador','valor'],['adultos',S.adults.length],['crianças',S.children.length],['total',S.adults.length+S.children.length],...STATUS.map(s=>[s.label,S.adults.filter(a=>(a.status||'pendente')===s.id).length])];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(summary),'Resumo');
  XLSX.writeFile(wb,`lista-vicente-${now()}.xlsx`);notify('Lista exportada em Excel')
}
function handleImport(input){
  const f=input.files[0];if(!f)return;
  const ext=f.name.split('.').pop().toLowerCase();
  const reader=new FileReader();
  reader.onload=e=>{try{if(ext==='json')importJSON(e.target.result);else if(ext==='xlsx'||ext==='xls')importXLSX(e.target.result);else importCSV(e.target.result);}catch(err){console.error(err);notify('Erro: '+err.message,'err');}input.value='';};
  if(ext==='xlsx'||ext==='xls')reader.readAsArrayBuffer(f);else reader.readAsText(f,'UTF-8');
}
function importJSON(raw){const data=migrate(JSON.parse(raw));if(!confirm('Restaurar backup JSON e substituir a lista atual?'))return;S=data;save();renderAll();notify('Backup restaurado')}
function importXLSX(buf){const wb=XLSX.read(buf,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];const rows=XLSX.utils.sheet_to_json(ws,{defval:''});importRows(rows)}
function csvRow(line){const out=[];let cur='',q=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){if(q&&line[i+1]==='"'){cur+='"';i++;}else q=!q;}else if((c===','||c===';')&&!q){out.push(cur.trim());cur='';}else cur+=c;}out.push(cur.trim());return out}
function cleanKey(k){return norm(k).replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'')}
function importCSV(raw){const text=raw.replace(/^﻿/,'');const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));if(!lines.length){notify('Arquivo vazio','err');return}const hdr=csvRow(lines[0]).map(cleanKey);const rows=lines.slice(1).map(l=>Object.fromEntries(hdr.map((h,j)=>[h,csvRow(l)[j]||''])));importRows(rows)}
function importRows(rows){
  let nA=0,nC=0,nS=0;
  for(const raw of rows){
    const row={};Object.keys(raw).forEach(k=>row[cleanKey(k)]=String(raw[k]??'').trim());
    const tipo=norm(row.tipo||row.type||'');const nome=row.nome||row.name||'';
    if(!nome||!tipo){nS++;continue;}
    if(tipo==='adulto'){
      const cn=row.categoria||row.category||'';let cat=S.categories.find(c=>norm(c.name)===norm(cn));if(!cat)cat=S.categories.find(c=>c.id==='cat0');
      const st=STATUS.find(s=>s.id===norm(row.status||row.confirmacao||'').replace(/ /g,'_'))?.id||'pendente';
      S.adults.push({id:uid(),name:nome,catId:cat?.id||'cat0',status:st,phone:row.whatsapp||row.telefone||'',food:row.restricao_alimentar||row.restricao||'',notes:row.observacoes||row.obs||'',childrenIds:[]});nA++;
    }else if(tipo.startsWith('crian')||tipo==='crianca'){
      const cid=uid();const p1n=row.responsavel_1||row.pai_mae_1||'',p2n=row.responsavel_2||row.pai_mae_2||'';
      const p1=S.adults.find(a=>norm(a.name)===norm(p1n));const p2=S.adults.find(a=>norm(a.name)===norm(p2n));
      const pids=[p1?.id,p2?.id].filter(Boolean);
      S.children.push({id:cid,name:nome,age:row.idade||row.age||'?',parentIds:pids});
      pids.forEach(pid=>{const a=adultById(pid);if(a){if(!a.childrenIds)a.childrenIds=[];a.childrenIds.push(cid);}});nC++;
    }else nS++;
  }
  S=migrate(S);save();renderAll();notify(`Importado: ${nA} adulto(s), ${nC} criança(s)${nS?' · '+nS+' ignorado(s)':''}`)
}

// CAPTURE
function captureBoard(){
  notify('Capturando...');
  const el=document.getElementById('board');
  if(typeof html2canvas==='undefined'){notify('html2canvas não carregado','err');return;}
  html2canvas(el,{scale:1.5,useCORS:true,allowTaint:true,backgroundColor:'#F1F5F9',logging:false}).then(canvas=>{
    const a=document.createElement('a');a.download=`lista-vicente-${now()}.png`;a.href=canvas.toDataURL('image/png');
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    notify('Imagem salva!');
  }).catch(e=>{notify('Erro ao capturar','err');console.error(e);});
}

function notify(msg,type='ok'){const el=document.getElementById('notif');el.textContent=msg;el.className=type+' show';clearTimeout(window._nt);window._nt=setTimeout(()=>el.classList.remove('show'),3000)}

renderAll();
