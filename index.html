<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Festa do Vicente · 1 ano</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F1F5F9;--surface:#fff;--surface2:#F8FAFC;--border:#E2E8F0;--border2:#CBD5E1;
  --text:#0F172A;--text2:#475569;--text3:#94A3B8;
  --accent:#6366F1;--accent-bg:#EEF2FF;--accent-bd:#C7D2FE;
  --green:#10B981;--green-bg:#ECFDF5;--green-bd:#6EE7B7;
  --pink:#EC4899;
  --sh1:0 1px 3px rgba(0,0,0,.08);--sh2:0 6px 18px rgba(15,23,42,.08);--sh3:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -4px rgba(0,0,0,.05);
  --r:12px;--rs:8px
}
html{overflow-x:hidden}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;-webkit-tap-highlight-color:transparent}
button,input,select{font-family:inherit}

/* HEADER */
.hdr{background:linear-gradient(135deg,#1E1B4B 0%,#312E81 45%,#4C1D95 100%);padding:0 16px;height:56px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:30;box-shadow:0 2px 16px rgba(79,70,229,.4)}
.brand{font-size:16px;font-weight:800;white-space:nowrap;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.25)}
.brand small{font-weight:500;color:rgba(255,255,255,.55);margin-left:4px;font-size:12px}
.sep{flex:1;min-width:6px}
.stats{display:flex;gap:10px;font-size:12px;color:rgba(255,255,255,.65);white-space:nowrap}
.stats b{color:#fff;font-weight:800}
.hdr-acts{display:flex;align-items:center;gap:6px}
.btn{padding:7px 12px;border-radius:var(--rs);border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.12);font-size:13px;font-weight:650;color:rgba(255,255,255,.9);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;line-height:1;min-height:32px}
.btn:hover{border-color:rgba(255,255,255,.35);background:rgba(255,255,255,.22);color:#fff}
.btn-p{background:#6366F1;border-color:rgba(255,255,255,.3);color:#fff}
.btn-p:hover{background:#4F46E5}
.btn-g{background:#10B981;border-color:rgba(255,255,255,.3);color:#fff}
.btn-g:hover{background:#059669}
.bi{width:28px;height:28px;padding:0;display:inline-flex;align-items:center;justify-content:center;font-size:13px;border-radius:var(--rs);border:1px solid transparent;background:transparent;cursor:pointer;color:var(--text3);transition:all .15s;line-height:1;flex-shrink:0}
.bi:hover{background:var(--bg);border-color:var(--border);color:var(--text2)}
.bi.d:hover{background:#FEF2F2;border-color:#EF4444;color:#EF4444}
.sync-st{font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;white-space:nowrap;transition:all .3s}
.sync-st.ok{color:#34D399;background:rgba(16,185,129,.18)}
.sync-st.syncing{color:rgba(255,255,255,.6);background:rgba(255,255,255,.1)}
.sync-st.err{color:#FCA5A5;background:rgba(239,68,68,.18)}
.sync-st.off{display:none}

/* TOOLS */
.tools{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.searchbox{position:relative;flex:1;min-width:200px}
.searchbox input{width:100%;height:38px;padding:0 12px 0 34px;border:1.5px solid var(--border);border-radius:999px;background:var(--surface2);outline:none;font-size:13px;color:var(--text);transition:all .15s}
.searchbox input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px var(--accent-bg)}
.searchbox span{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.fsel{height:38px;padding:0 12px;border:1.5px solid var(--border);border-radius:999px;background:var(--surface2);font-size:12px;font-weight:650;color:var(--text2);outline:none;max-width:180px}
.fsel:focus{border-color:var(--accent);background:#fff}
.segment{display:flex;gap:2px;background:var(--bg);border:1px solid var(--border);border-radius:999px;padding:3px}
.seg{border:0;background:transparent;border-radius:999px;padding:7px 13px;font-size:12px;font-weight:750;color:var(--text2);cursor:pointer;transition:all .15s}
.seg.active{background:#fff;color:var(--accent);box-shadow:var(--sh1)}

/* BOARD */
.board{display:flex;flex-wrap:wrap;align-items:flex-start;gap:12px;padding:14px;-webkit-overflow-scrolling:touch}

/* COLUMN */
.col{flex:1;min-width:230px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;box-shadow:var(--sh1)}
.col-hdr{padding:11px 12px;display:flex;align-items:center;gap:8px}
.col-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.col-name{font-size:13px;font-weight:800;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.col-cnt{font-size:11px;font-weight:800;color:var(--text3);background:rgba(0,0,0,.06);padding:2px 8px;border-radius:999px;flex-shrink:0}
.col-chev{display:none;font-size:11px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.col.collapsed .col-chev{transform:rotate(-90deg)}
.col.collapsed .col-body,.col.collapsed .col-ft{display:none}
.col-body{padding:8px;display:flex;flex-direction:column;gap:6px;min-height:44px}
.col-body.dover{background:var(--accent-bg);outline:2px dashed var(--accent);outline-offset:-3px;border-radius:var(--rs)}
.col-ft{padding:8px;border-top:1px solid var(--border)}
.btn-ac{width:100%;padding:8px;border:1.5px dashed var(--border2);border-radius:var(--rs);background:transparent;font-size:12px;font-weight:700;color:var(--text3);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;min-height:38px}
.btn-ac:hover,.btn-ac.dover-ac{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.btn-newcol{width:180px;flex-shrink:0;min-height:48px;border:2px dashed var(--border2);border-radius:var(--r);background:transparent;font-size:12px;font-weight:750;color:var(--text3);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;align-self:flex-start}
.btn-newcol:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.empty-col{text-align:center;color:var(--text3);font-size:12px;padding:18px 8px;font-style:italic}

/* ADULT CARD */
.acard{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:9px 10px;cursor:grab;transition:box-shadow .15s,border-color .15s,background .15s;user-select:none;touch-action:none}
.acard:hover{border-color:var(--border2);box-shadow:var(--sh1)}
.acard.dragging{opacity:.4}
.acard.child-mode{border-color:var(--green-bd)}
.acard.child-hover{border-color:var(--green);box-shadow:0 0 0 3px var(--green-bg);background:var(--green-bg)}
.card-row{display:flex;align-items:center;gap:8px}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:850;color:#fff;flex-shrink:0;letter-spacing:-.5px;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.card-name{font-size:13px;font-weight:800;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-acts{display:none;gap:2px;align-items:center}
.acard:hover .card-acts,.ccard:hover .card-acts{display:flex}
.meta-line{margin-top:6px;padding-left:38px;display:flex;gap:5px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:3px;border-radius:999px;padding:2px 8px;font-size:11px;font-weight:800;border:1px solid transparent;line-height:1.4;cursor:pointer}
.pill:hover{filter:brightness(.97)}
.kids-line{margin-top:6px;padding-left:38px;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.kids-lbl{font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.chip{display:inline-flex;align-items:center;gap:3px;background:var(--green-bg);border:1px solid var(--green-bd);border-radius:999px;padding:2px 8px;font-size:11px;color:#047857;font-weight:700}

/* FAMILY GROUP */
.fgroup{border:2px solid var(--accent-bd);border-radius:var(--r);overflow:hidden;background:var(--surface);box-shadow:var(--sh1)}
.fgroup.dragging{opacity:.4}
.fgroup-hdr{font-size:11px;font-weight:850;padding:7px 11px;display:flex;align-items:center;gap:5px;background:linear-gradient(to right,var(--accent-bg),#E8EDFF);border-bottom:1px solid var(--accent-bd);color:#4338CA;cursor:grab;user-select:none}
.fgroup-hdr small{font-size:9px;color:var(--text3);font-weight:500;margin-left:auto}
.fgroup-parents{display:flex;flex-direction:column;gap:4px;padding:6px;background:#F5F7FF}
.fgroup-parents .acard{box-shadow:none}
.fgroup-children{padding:6px 10px;display:flex;flex-wrap:wrap;gap:4px;align-items:center;border-top:1px dashed var(--accent-bd)}

/* CHILD CARD */
.ccard{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:var(--rs);padding:9px 10px;cursor:grab;user-select:none;transition:box-shadow .15s;touch-action:none}
.ccard:hover{box-shadow:var(--sh1)}
.ccard.dragging{opacity:.4}
.child-name{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.child-age{font-size:11px;color:var(--text3)}
.child-parents{font-size:11px;color:var(--text2);margin-top:5px;padding-left:38px;font-style:italic;line-height:1.4}
.col.chlcol{border-color:var(--green-bd)}
.chlcol .col-hdr{background:linear-gradient(135deg,#ECFDF5,#D1FAE5)}
.chlcol .col-name{color:#059669}
.chlcol .col-cnt{background:rgba(16,185,129,.15);color:#059669}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;padding:16px}
.overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--surface);border-radius:16px;padding:22px;width:100%;max-width:440px;box-shadow:var(--sh3);transform:scale(.95) translateY(-8px);transition:transform .2s;max-height:calc(100dvh - 32px);overflow-y:auto}
.overlay.open .modal{transform:scale(1) translateY(0)}
.modal-title{font-size:17px;font-weight:850;margin-bottom:16px}
.field{margin-bottom:13px}
.lbl{display:block;font-size:11px;font-weight:850;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.inp,.sel{width:100%;padding:10px 11px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:14px;color:var(--text);background:#fff;outline:none;transition:border-color .15s;min-height:42px}
.inp:focus,.sel:focus{border-color:var(--accent)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-ft{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.modal-ft .btn{min-height:40px;font-size:13px;background:var(--bg);border:1px solid var(--border);color:var(--text2)}
.modal-ft .btn:hover{background:var(--surface2);border-color:var(--border2);color:var(--text)}
.modal-ft .btn-p{background:var(--accent);border-color:var(--accent);color:#fff}
.modal-ft .btn-p:hover{background:#4F46E5;color:#fff}
.colors{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.cdot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border-color .15s,transform .1s;flex-shrink:0}
.cdot:hover{transform:scale(1.12)}
.cdot.sel{border-color:var(--text)}

/* MOBILE */
.fab{display:none;position:fixed;right:16px;bottom:16px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:30px;font-weight:300;line-height:1;box-shadow:0 8px 22px rgba(99,102,241,.5);cursor:pointer;z-index:150;align-items:center;justify-content:center;transition:transform .15s}
.fab:active{transform:scale(.9)}
.sheet-ov{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:160;opacity:0;pointer-events:none;transition:opacity .2s}
.sheet-ov.open{opacity:1;pointer-events:auto}
.sheet{position:absolute;left:0;right:0;bottom:0;background:var(--surface);border-radius:22px 22px 0 0;padding:12px 16px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -8px 30px rgba(0,0,0,.18);transform:translateY(110%);transition:transform .28s cubic-bezier(.34,1.4,.5,1);display:flex;flex-direction:column;gap:8px}
.sheet-ov.open .sheet{transform:translateY(0)}
.sheet-grab{width:40px;height:4px;border-radius:999px;background:var(--border2);margin:2px auto 10px}
.sheet-btn{display:flex;align-items:center;gap:12px;width:100%;padding:15px;border:1px solid var(--border);border-radius:14px;background:var(--surface);font-size:15px;font-weight:750;color:var(--text);cursor:pointer;text-align:left}
.sheet-btn:active{background:var(--bg)}
.sheet-btn.p{background:var(--accent-bg);border-color:var(--accent-bd);color:var(--accent)}
.sheet-btn.g{background:var(--green-bg);border-color:var(--green-bd);color:#059669}

#tclone{position:fixed;pointer-events:none;z-index:9999;opacity:.88;transform:scale(1.06);box-shadow:0 12px 32px rgba(0,0,0,.25);border-radius:var(--rs)}
#notif{position:fixed;bottom:16px;right:16px;padding:11px 15px;border-radius:var(--r);color:#fff;font-size:13px;font-weight:750;box-shadow:var(--sh3);z-index:999;transform:translateY(60px);transition:transform .25s cubic-bezier(.34,1.56,.64,1);pointer-events:none;max-width:calc(100vw - 32px)}
#notif.show{transform:translateY(0)}
#notif.ok{background:#0F172A}
#notif.err{background:#EF4444}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:999px}

@media(max-width:768px){
  .hdr{height:52px;padding:0 12px}
  .brand{font-size:14px}
  .hdr-acts{display:none}
  .fab{display:flex}
  .sheet-ov{display:block}
  .tools{padding:8px 10px;gap:6px}
  .searchbox{min-width:100%;order:1}
  .fsel{flex:1;min-width:0;max-width:none}
  .segment{order:4;width:100%}
  .seg{flex:1}
  .board{flex-direction:column;flex-wrap:nowrap;align-items:stretch;padding:10px 10px 90px;gap:8px}
  .col{width:100%;min-width:0;flex:none}
  .col-hdr{cursor:pointer}
  .col-chev{display:block}
  .btn-newcol{width:100%}
  .card-acts{display:flex!important}
  .modal{border-radius:18px;padding:18px}
  .form-grid{grid-template-columns:1fr}
  #notif{bottom:84px;left:12px;right:12px;max-width:none;text-align:center}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="brand">🎂 <span>Festa do Vicente</span> <small>· 1 ano</small></div>
  <div class="stats"><span><b id="hA">0</b> adultos</span><span><b id="hC">0</b> crianças</span><span><b id="hT">0</b> total</span></div>
  <div class="sep"></div>
  <div id="sync-st" class="sync-st off"></div>
  <div class="hdr-acts">
    <button class="btn btn-p" onclick="openModal('adult')">+ Adulto</button>
    <button class="btn btn-g" onclick="openModal('child')">+ Criança</button>
  </div>
</header>

<section class="tools">
  <div class="searchbox"><span>🔎</span><input id="q" type="search" placeholder="Buscar por nome..." oninput="setFilters()"></div>
  <select class="fsel" id="f-status" onchange="setFilters()"><option value="all">Todos os status</option></select>
  <select class="fsel" id="f-cat" onchange="setFilters()"><option value="all">Todas categorias</option></select>
  <div class="segment">
    <button class="seg active" id="view-cat" onclick="setView('cat')">Categorias</button>
    <button class="seg" id="view-status" onclick="setView('status')">Status</button>
  </div>
</section>

<div class="board" id="board"></div>

<button class="fab" onclick="toggleSheet()" aria-label="Adicionar">＋</button>
<div class="sheet-ov" id="sheet-ov" onclick="sheetClick(event)">
  <div class="sheet">
    <div class="sheet-grab"></div>
    <button class="sheet-btn p" onclick="sheetGo('adult')">👤 <span>Adicionar adulto</span></button>
    <button class="sheet-btn g" onclick="sheetGo('child')">👶 <span>Adicionar criança</span></button>
    <button class="sheet-btn" onclick="sheetGo('category')">🏷️ <span>Nova categoria</span></button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-title" id="mtitle"></div>
    <div id="mbody"></div>
    <div class="modal-ft">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-p" id="mok" onclick="confirmModal()">OK</button>
    </div>
  </div>
</div>
<div id="notif"></div>

<script>
const FB_CONFIG = {
  apiKey:            "AIzaSyDpfFCbuxji7lCYPgpr0uUQUSuhX8IDmLE",
  authDomain:        "lista-vicente.firebaseapp.com",
  projectId:         "lista-vicente",
  storageBucket:     "lista-vicente.firebasestorage.app",
  messagingSenderId: "392963251344",
  appId:             "1:392963251344:web:76b425839e53084c840c15"
};
const FB_ON = FB_CONFIG.apiKey !== 'COLE_SUA_API_KEY';

const PAL=['#6366F1','#EC4899','#F59E0B','#10B981','#3B82F6','#8B5CF6','#EF4444','#0EA5E9','#F97316','#84CC16'];
const STATUS=[
  {id:'pendente',  label:'Pendente',  icon:'⏳',color:'#B45309',bg:'#FFFBEB',bd:'#FDE68A'},
  {id:'confirmado',label:'Confirmado',icon:'✅',color:'#047857',bg:'#ECFDF5',bd:'#6EE7B7'},
  {id:'talvez',    label:'Talvez',    icon:'❔',color:'#4F46E5',bg:'#EEF2FF',bd:'#C7D2FE'},
  {id:'nao_vai',   label:'Não vai',   icon:'✕', color:'#DC2626',bg:'#FEF2F2',bd:'#FECACA'}
];
const INIT={
  categories:[
    {id:'cat1',name:'Parentes Evelin',color:'#EC4899'},
    {id:'cat2',name:'Parentes Bruno', color:'#3B82F6'},
    {id:'cat3',name:'Amigos Evelin',  color:'#10B981'},
    {id:'cat4',name:'Amigos Bruno',   color:'#F59E0B'},
    {id:'cat0',name:'Sem Categoria',  color:'#94A3B8'}
  ],
  adults:[
    {id:'a1', name:'Evelin',        catId:'cat0',status:'pendente',childrenIds:[]},
    {id:'a2', name:'Bruno',         catId:'cat0',status:'pendente',childrenIds:[]}
  ],
  children:[]
};

// STATE
const LS_KEY='vp5';
function clone(o){return JSON.parse(JSON.stringify(o))}
function loadLocal(){
  try{
    const s=localStorage.getItem(LS_KEY);
    if(s)return JSON.parse(s);
    const old=localStorage.getItem('vp4');
    if(old){const d=JSON.parse(old);localStorage.setItem(LS_KEY,JSON.stringify(d));return d;}
    return clone(INIT);
  }catch{return clone(INIT);}
}
function migrate(s){
  if(!s||!Array.isArray(s.adults)||!Array.isArray(s.children)||!Array.isArray(s.categories))return clone(INIT);
  s.adults.forEach(a=>{
    if(!a.childrenIds)a.childrenIds=[];
    if(!a.status)a.status='pendente';
    // limpa campos antigos removidos (whatsapp, restrição, observações, casal)
    delete a.phone;delete a.food;delete a.notes;delete a.partnerId;
  });
  s.children.forEach(c=>{if(!c.parentIds)c.parentIds=[];});
  return s;
}
let S=migrate(loadLocal());
let filters={q:'',status:'all',cat:'all'};
let viewMode='cat';
let drag=null;

function saveLocal(){try{localStorage.setItem(LS_KEY,JSON.stringify(S));}catch{}}
function uid(){return '_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function norm(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'')}
function initials(n){return(n||'').split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2)}
function nameColor(n){let h=0;for(let i=0;i<String(n).length;i++)h=(h*31+String(n).charCodeAt(i))&0xffffffff;return PAL[Math.abs(h)%PAL.length]}
function statusInfo(id){return STATUS.find(s=>s.id===id)||STATUS[0]}
function catById(id){return S.categories.find(c=>c.id===id)||S.categories.find(c=>c.id==='cat0')||S.categories[0]}
function adultById(id){return S.adults.find(a=>a.id===id)}
function childById(id){return S.children.find(c=>c.id===id)}

// FIREBASE
let db=null,docRef=null,_fbWritePending=false,_fbDebounce;
if(FB_ON){
  try{
    firebase.initializeApp(FB_CONFIG);
    db=firebase.firestore();
    db.enablePersistence().catch(()=>{});
    docRef=db.collection('festa').doc('vicente');
    docRef.onSnapshot(snap=>{
      if(!snap.exists)return;
      if(_fbWritePending)return;
      const remote=migrate(snap.data());
      if(JSON.stringify(remote)!==JSON.stringify(S)){S=remote;saveLocal();renderAll();}
      setSyncSt('ok','Sincronizado');
    },()=>setSyncSt('err','Erro de conexão'));
    setSyncSt('syncing','Conectando...');
  }catch(e){setSyncSt('err','Firebase inválido');console.error(e)}
}
function syncToFB(){
  if(!FB_ON||!docRef)return;
  setSyncSt('syncing','Salvando...');_fbWritePending=true;clearTimeout(_fbDebounce);
  _fbDebounce=setTimeout(async()=>{
    try{await docRef.set(S);setSyncSt('ok','Sincronizado');}
    catch(e){setSyncSt('err','Erro ao salvar');console.error(e);}
    finally{setTimeout(()=>{_fbWritePending=false;},800);}
  },1000);
}
function setSyncSt(type,msg){const el=document.getElementById('sync-st');if(!el)return;el.className='sync-st '+type;el.textContent={ok:'● '+msg,syncing:'⟳ '+msg,err:'✕ '+msg}[type]||msg}
function save(){saveLocal();syncToFB();}

// GROUPS (agrupa adultos que compartilham os mesmos filhos)
function getGroups(catId){
  const list=S.adults.filter(a=>a.catId===catId);
  const byId=Object.fromEntries(list.map(a=>[a.id,a]));
  const done=new Set(),out=[];
  for(const a of list){
    if(done.has(a.id))continue;
    const stack=[a],members=[];done.add(a.id);
    while(stack.length){
      const cur=stack.pop();members.push(cur);
      const kids=cur.childrenIds||[];
      if(kids.length){
        for(const b of list){
          if(done.has(b.id))continue;
          if((b.childrenIds||[]).some(k=>kids.includes(k))){done.add(b.id);stack.push(byId[b.id]);}
        }
      }
    }
    const childIds=[...new Set(members.flatMap(m=>m.childrenIds||[]))];
    if(members.length<2)out.push({type:'solo',adult:members[0],members:[members[0]],childIds});
    else out.push({type:'group',members,childIds});
  }
  return out;
}
function allGroups(){return S.categories.flatMap(c=>getGroups(c.id).map(g=>({...g,catId:c.id})))}
function groupText(g){
  const members=g.members||[g.adult];
  const kids=(g.childIds||[]).map(childById).filter(Boolean);
  const cat=catById(members[0]?.catId);
  return norm([members.map(a=>a.name).join(' '),kids.map(c=>c.name+' '+c.age).join(' '),cat?.name].join(' '));
}
function groupVisible(g){
  const members=g.members||[g.adult];
  if(filters.cat!=='all'&&members[0]?.catId!==filters.cat)return false;
  if(filters.status!=='all'&&!members.some(a=>(a.status||'pendente')===filters.status))return false;
  if(filters.q&&!groupText(g).includes(norm(filters.q)))return false;
  return true;
}
function childVisible(c){
  const parents=S.adults.filter(a=>(a.childrenIds||[]).includes(c.id));
  if(filters.cat!=='all'&&!parents.some(a=>a.catId===filters.cat))return false;
  if(filters.status!=='all'&&!parents.some(a=>(a.status||'pendente')===filters.status))return false;
  const txt=norm([c.name,c.age,parents.map(a=>a.name).join(' ')].join(' '));
  if(filters.q&&!txt.includes(norm(filters.q)))return false;
  return true;
}
function hasActiveFilters(){return !!(filters.q||filters.status!=='all'||filters.cat!=='all')}

function kidsChips(childIds){

}

function renderFGroup(g){

function renderCol(cat){
  const grps=getGroups(cat.id).filter(groupVisible);
  const allCnt=S.adults.filter(a=>a.catId===cat.id).length;
  const visCnt=grps.reduce((s,g)=>s+(g.members?g.members.length:1),0);

function renderStatusCol(st){
  const grps=allGroups().filter(g=>groupVisible(g)&&g.members.some(a=>(a.status||'pendente')===st.id));
  const cnt=S.adults.filter(a=>(a.status||'pendente')===st.id).length;
  const body=grps.length?grps.map(g=>g.type==='solo'?renderACard(g.adult):renderFGroup(g)).join(''):`<div class="empty-col">Nenhum convidado</div>`;

  </div>`;

function renderChildCol(){
  const visible=S.children.filter(childVisible);
  const cards=visible.map(c=>{
    const pn=S.adults.filter(a=>(a.childrenIds||[]).includes(c.id)).map(a=>a.name);

// STATUS DRAG
function statusOver(e,statusId){if(!drag||drag.type==='child')return;e.preventDefault();e.stopPropagation();document.getElementById('sb-'+statusId)?.classList.add('dover')}
function statusLeave(e,statusId){const el=document.getElementById('sb-'+statusId);if(el&&!el.contains(e.relatedTarget))el.classList.remove('dover')}

  e.preventDefault();e.stopPropagation();if(!drag)return;

  else if(drag.type==='group'){drag.ids.forEach(id=>{const a=adultById(id);if(a)a.status=statusId;});}

// MOUSE D&D
function dStart(e,type,id){drag={type,id};e.dataTransfer.effectAllowed='move';setTimeout(()=>{document.getElementById((type==='adult'?'ac-':'cc-')+id)?.classList.add('dragging');if(type==='child')document.querySelectorAll('.acard').forEach(el=>el.classList.add('child-mode'));},0)}
function dEnd(){document.querySelectorAll('.dragging,.child-mode,.child-hover,.dover,.dover-ac').forEach(el=>el.classList.remove('dragging','child-mode','child-hover','dover','dover-ac'));drag=null}
function btnAcOver(e,catId){if(!drag||drag.type==='child')return;e.preventDefault();e.stopPropagation();e.currentTarget.classList.add('dover-ac')}
function btnAcLeave(e){e.currentTarget.classList.remove('dover-ac')}
function btnAcDrop(e,catId){e.currentTarget.classList.remove('dover-ac');colDrop(e,catId)}
function fgroupStart(e,idsStr){drag={type:'group',ids:idsStr.split(',')};e.dataTransfer.effectAllowed='move';e.stopPropagation();setTimeout(()=>e.target.closest('.fgroup')?.classList.add('dragging'),0)}
function colOver(e,catId){if(!drag||drag.type==='child')return;e.preventDefault();e.stopPropagation();document.getElementById('cb-'+catId)?.classList.add('dover')}
function colLeave(e,catId){const el=document.getElementById('cb-'+catId);if(el&&!el.contains(e.relatedTarget))el.classList.remove('dover')}
function colDrop(e,catId){
  e.preventDefault();e.stopPropagation();if(!drag)return;
  const catName=catById(catId)?.name||'';
  if(drag.type==='adult'){const a=adultById(drag.id);if(a){a.catId=catId;save();render();notify('Movido para '+catName);}}
  else if(drag.type==='group'){drag.ids.forEach(id=>{const m=adultById(id);if(m)m.catId=catId;});save();render();notify('Família movida para '+catName);}
}
function acOver(e,aid){
  if(!drag)return;e.preventDefault();e.stopPropagation();
  if(drag.type==='child'){document.querySelectorAll('.child-hover').forEach(el=>el.classList.remove('child-hover'));document.getElementById('ac-'+aid)?.classList.add('child-hover');}
  else if(drag.type==='group'){document.getElementById('ac-'+aid)?.closest('.col-body')?.classList.add('dover');}
}
function acLeave(e,aid){const card=document.getElementById('ac-'+aid);if(card&&!card.contains(e.relatedTarget))card.classList.remove('child-hover')}
function acDrop(e,aid){
  e.preventDefault();e.stopPropagation();if(!drag)return;
  if(drag.type==='child'){linkChild(drag.id,aid);}
  else if(drag.type==='adult'&&drag.id!==aid){const a=adultById(drag.id),b=adultById(aid);if(a&&b){a.catId=b.catId;save();render();notify(`${a.name} movido(a)`);}}
  else if(drag.type==='group'){const b=adultById(aid);if(b)colDrop(e,b.catId);}
}

// TOUCH D&D
let tD=null,tCl=null,_tdActive=null;
function _tCleanup(){if(_tdActive){document.removeEventListener('touchmove',_tdActive);_tdActive=null;}}
function _tActivate(){
  if(_tdActive)return;
  _tdActive=function(e){
    if(!tD||!tD.active){_tCleanup();return;}
    e.preventDefault();
    const t=e.touches[0];
    if(tCl){tCl.style.top=(t.clientY-tD.oy)+'px';tCl.style.left=(t.clientX-tD.ox)+'px';tCl.style.display='none';}
    const under=document.elementFromPoint(t.clientX,t.clientY);
    if(tCl)tCl.style.display='';
    document.querySelectorAll('.child-hover,.dover,.dover-ac').forEach(el=>el.classList.remove('child-hover','dover','dover-ac'));
    if(tD.type==='child'){under?.closest('.acard')?.classList.add('child-hover');}
    else{
      const tb=under?.closest('.col-body'),bac=under?.closest('.btn-ac');
      if(bac)bac.classList.add('dover-ac');
      else if(tb)tb.classList.add('dover');
    }
  };
  document.addEventListener('touchmove',_tdActive,{passive:false});
}
function _tStart(el,t,tDObj){
  tD=tDObj;
  tD.timer=setTimeout(()=>{
    if(!tD)return;tD.active=true;
    const r=el.getBoundingClientRect();
    tCl=el.cloneNode(true);tCl.id='tclone';
    tCl.style.cssText=`width:${r.width}px;top:${r.top}px;left:${r.left}px`;
    document.body.appendChild(tCl);el.style.opacity='.35';
    tD.ox=t.clientX-r.left;tD.oy=t.clientY-r.top;
    if(tD.type==='child')document.querySelectorAll('.acard').forEach(c=>c.classList.add('child-mode'));
    _tActivate();
  },220);
}
document.addEventListener('touchstart',e=>{
  if(e.touches.length!==1)return;
  const t=e.touches[0];
  const fhdr=e.target.closest('.fgroup-hdr');
  if(fhdr&&!e.target.closest('.bi')){
    const fg=fhdr.closest('.fgroup');if(!fg)return;
    const ids=[...fg.querySelectorAll('.acard')].map(c=>c.id.replace('ac-',''));
    _tStart(fg,t,{type:'group',ids,sx:t.clientX,sy:t.clientY,active:false,card:fg});
    return;
  }
  const card=e.target.closest('.acard,.ccard');
  if(!card||e.target.closest('.bi,.btn-ac,.pill'))return;
  const isA=card.classList.contains('acard');
  const id=card.id.replace(isA?'ac-':'cc-','');
  _tStart(card,t,{type:isA?'adult':'child',id,sx:t.clientX,sy:t.clientY,active:false,card});
},{passive:true});
document.addEventListener('touchmove',e=>{
  if(!tD||tD.active)return;
  const t=e.touches[0];
  if(Math.abs(t.clientX-tD.sx)>10||Math.abs(t.clientY-tD.sy)>10){clearTimeout(tD.timer);_tCleanup();tD=null;}
},{passive:true});
document.addEventListener('touchend',e=>{
  _tCleanup();
  if(!tD)return;clearTimeout(tD.timer);
  if(!tD.active){tD=null;return;}
  const t=e.changedTouches[0];
  if(tCl){document.body.removeChild(tCl);tCl=null;}
  if(tD.card)tD.card.style.opacity='';
  const under=document.elementFromPoint(t.clientX,t.clientY);
  const fake={preventDefault:()=>{},stopPropagation:()=>{}};
  if(tD.type==='child'){
    const tc=under?.closest('.acard');if(tc)linkChild(tD.id,tc.id.replace('ac-',''));
  }else{
    const tc=under?.closest('.acard'),tb=under?.closest('.col-body'),bac=under?.closest('.btn-ac');
    const sv=drag;drag=tD;
    if(tD.type==='adult'&&tc&&tc.id!=='ac-'+tD.id)acDrop(fake,tc.id.replace('ac-',''));
    else if(bac){const cid=bac.dataset.cat;if(cid)colDrop(fake,cid);}
    else if(tb){
      if(tb.id.startsWith('sb-'))statusDrop(fake,tb.id.replace('sb-',''));
      else{const cid=tb.id.replace('cb-','');if(cid!=='children')colDrop(fake,cid);}
    }
    drag=sv;
  }
  document.querySelectorAll('.child-mode,.child-hover,.dover,.dover-ac').forEach(el=>el.classList.remove('child-mode','child-hover','dover','dover-ac'));
  tD=null;
},{passive:true});

// ACTIONS
function linkChild(cid,aid){const a=adultById(aid),c=childById(cid);if(!a||!c)return;if(!a.childrenIds)a.childrenIds=[];if(!c.parentIds)c.parentIds=[];if(!a.childrenIds.includes(cid))a.childrenIds.push(cid);if(!c.parentIds.includes(aid))c.parentIds.push(aid);save();render();notify(`${c.name} vinculado(a) a ${a.name}`)}
function cycleStatus(e,id){e.stopPropagation();const a=adultById(id);if(!a)return;const idx=STATUS.findIndex(s=>s.id===(a.status||'pendente'));a.status=STATUS[(idx+1)%STATUS.length].id;save();render();notify(`${a.name}: ${statusInfo(a.status).label}`)}
function toggleCol(e,id){
  if(!window.matchMedia('(max-width:768px)').matches)return;
  if(e.target.closest('.bi'))return;
  document.getElementById('col-'+id)?.classList.toggle('collapsed');
}
function delAdult(e,id){e.stopPropagation();const a=adultById(id);if(!a||!confirm(`Remover "${a.name}"?`))return;S.adults=S.adults.filter(x=>x.id!==id);S.children.forEach(c=>{c.parentIds=(c.parentIds||[]).filter(p=>p!==id);});save();renderAll();notify(`${a.name} removido(a)`)}
function delChild(e,id){e.stopPropagation();const c=childById(id);if(!c||!confirm(`Remover "${c.name}"?`))return;S.children=S.children.filter(x=>x.id!==id);S.adults.forEach(a=>{a.childrenIds=(a.childrenIds||[]).filter(k=>k!==id);});save();renderAll();notify(`${c.name} removido(a)`)}
function delCat(e,id){e.stopPropagation();if(id==='cat0')return;const cat=catById(id);if(!cat)return;const n=S.adults.filter(a=>a.catId===id).length;if(!confirm(`Excluir "${cat.name}"?${n?`\n${n} adulto(s) vão para Sem Categoria`:''}`))return;S.adults.forEach(a=>{if(a.catId===id)a.catId='cat0';});S.categories=S.categories.filter(c=>c.id!==id);save();renderAll();notify(`"${cat.name}" excluída`)}
function editCat(e,id){e.stopPropagation();openModal('editCategory',id)}
function editAdult(e,id){e.stopPropagation();openModal('editAdult',id)}
function editChild(e,id){e.stopPropagation();openModal('editChild',id)}

let mCtx={};

function catOpts(sel='cat0'){return S.categories.map(c=>`<option value="${c.id}"${c.id===sel?' selected':''}>${esc(c.name)}</option>`).join('')}
function openModal(type,arg){
  mCtx={type,arg};const ti=document.getElementById('mtitle'),bd=document.getElementById('mbody'),ok=document.getElementById('mok');ok.style.display='';
  if(type==='adult'||type==='editAdult'){
    const edit=type==='editAdult';const a=edit?adultById(arg):{name:'',catId:arg||'cat0',status:'pendente'};
    if(!a)return;ti.textContent=edit?'Editar Adulto':'Adicionar Adulto';ok.textContent=edit?'Salvar':'Adicionar';
    bd.innerHTML=`<div class="field"><label class="lbl">Nome</label><input class="inp" id="mi-name" autocomplete="off" value="${esc(a.name)}" placeholder="Nome do convidado"></div>
    <div class="form-grid"><div class="field"><label class="lbl">Categoria</label><select class="sel" id="mi-cat">${catOpts(a.catId)}</select></div><div class="field"><label class="lbl">Confirmação</label><select class="sel" id="mi-status">${statusOpts(a.status||'pendente')}</select></div></div>`;
  }else if(type==='child'||type==='editChild'){
    const edit=type==='editChild';const c=edit?childById(arg):{name:'',age:'',parentIds:[]};if(!c)return;
    ti.textContent=edit?'Editar Criança':'Adicionar Criança';ok.textContent=edit?'Salvar':'Adicionar';
    const parents=S.adults.filter(a=>(a.childrenIds||[]).includes(c.id)).map(a=>a.id);
    const optsFor=sel=>`<option value="">— nenhum —</option>`+S.adults.map(a=>`<option value="${a.id}"${a.id===sel?' selected':''}>${esc(a.name)}</option>`).join('');
    bd.innerHTML=`<div class="field"><label class="lbl">Nome</label><input class="inp" id="mi-name" autocomplete="off" value="${esc(c.name)}" placeholder="Nome da criança"></div>
    <div class="field"><label class="lbl">Idade</label><input class="inp" id="mi-age" value="${esc(c.age)}" placeholder="Ex: 5 anos, 3 meses"></div>
    <div class="form-grid"><div class="field"><label class="lbl">Pai / Mãe 1</label><select class="sel" id="mi-p1">${optsFor(parents[0]||'')}</select></div><div class="field"><label class="lbl">Pai / Mãe 2</label><select class="sel" id="mi-p2">${optsFor(parents[1]||'')}</select></div></div>`;
  }else if(type==='category'||type==='editCategory'){
    const edit=type==='editCategory';const cat=edit?catById(arg):{name:'',color:PAL[0]};
    ti.textContent=edit?'Editar Categoria':'Nova Categoria';ok.textContent=edit?'Salvar':'Criar';
    const dots=PAL.map(col=>`<div class="cdot${(cat.color||PAL[0])===col?' sel':''}" style="background:${col}" data-c="${col}" onclick="pickColor('${col}')"></div>`).join('');
    bd.innerHTML=`<div class="field"><label class="lbl">Nome</label><input class="inp" id="mi-catname" value="${esc(cat.name||'')}" placeholder="Ex: Amigos do trabalho" autocomplete="off"></div><div class="field"><label class="lbl">Cor</label><div class="colors">${dots}</div><input type="hidden" id="mi-color" value="${cat.color||PAL[0]}"></div>`;
  }
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.querySelector('#mbody .inp')?.focus(),60);
}
function pickColor(c){document.getElementById('mi-color').value=c;document.querySelectorAll('.cdot').forEach(d=>d.classList.toggle('sel',d.dataset.c===c))}
function closeModal(){document.getElementById('overlay').classList.remove('open')}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeModal()}
function confirmModal(){
  const t=mCtx.type;
  if(t==='adult'||t==='editAdult'){
    const name=document.getElementById('mi-name').value.trim(),catId=document.getElementById('mi-cat').value,status=document.getElementById('mi-status').value;
    if(!name){notify('Informe o nome','err');return}
    if(t==='adult'){S.adults.push({id:uid(),name,catId,status,childrenIds:[]});notify(`${name} adicionado(a)`);}
    else{const a=adultById(mCtx.arg);if(a)Object.assign(a,{name,catId,status});notify('Convidado atualizado');}
    save();closeModal();renderAll();
  }else if(t==='child'||t==='editChild'){
    const name=document.getElementById('mi-name').value.trim(),age=document.getElementById('mi-age').value.trim(),p1=document.getElementById('mi-p1').value,p2=document.getElementById('mi-p2').value;
    if(!name){notify('Informe o nome','err');return}
    let c;
    if(t==='child'){c={id:uid(),name,age,parentIds:[]};S.children.push(c);notify(`${name} adicionado(a)`);}
    else{c=childById(mCtx.arg);if(!c)return;S.adults.forEach(a=>{a.childrenIds=(a.childrenIds||[]).filter(k=>k!==c.id);});c.name=name;c.age=age;notify('Criança atualizada');}
    const pids=[...new Set([p1,p2].filter(Boolean))];c.parentIds=pids;
    pids.forEach(pid=>{const a=adultById(pid);if(a){if(!a.childrenIds)a.childrenIds=[];if(!a.childrenIds.includes(c.id))a.childrenIds.push(c.id);}});
    save();closeModal();renderAll();
  }else if(t==='category'||t==='editCategory'){
    const name=document.getElementById('mi-catname').value.trim(),color=document.getElementById('mi-color').value;
    if(!name){notify('Informe o nome','err');return}
    if(t==='category'){S.categories.push({id:uid(),name,color});notify(`"${name}" criada`);}
    else{const cat=catById(mCtx.arg);if(cat){cat.name=name;cat.color=color;}notify('Categoria atualizada');}
    save();closeModal();renderAll();
  }
}
document.addEventListener('keydown',e=>{if(!document.getElementById('overlay').classList.contains('open'))return;if(e.key==='Escape')closeModal();else if(e.key==='Enter'&&e.target.tagName!=='SELECT')confirmModal();});

function notify(msg,type='ok'){const el=document.getElementById('notif');el.textContent=msg;el.className=type+' show';clearTimeout(window._nt);window._nt=setTimeout(()=>el.classList.remove('show'),3000)}

renderAll();
</script>
</body>
</html>
