<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Festa do Vicente · 1 ano</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Firebase SDK (compat) — carregado mesmo sem config para não bloquear -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F1F5F9;--surface:#fff;--border:#E2E8F0;--border2:#CBD5E1;
  --text:#0F172A;--text2:#475569;--text3:#94A3B8;
  --accent:#6366F1;--accent-bg:#EEF2FF;
  --green:#10B981;--green-bg:#ECFDF5;--green-bd:#6EE7B7;
  --danger:#EF4444;--danger-bg:#FEF2F2;
  --sh1:0 1px 3px rgba(0,0,0,.08);--sh3:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -4px rgba(0,0,0,.05);
  --r:8px;--rs:5px;--col:280px
}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;-webkit-tap-highlight-color:transparent}

/* ── HEADER ── */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;height:52px;display:flex;align-items:center;gap:8px;flex-shrink:0;z-index:10;overflow-x:auto}
.hdr::-webkit-scrollbar{display:none}
.brand{font-size:14px;font-weight:700;white-space:nowrap;flex-shrink:0}
.brand small{font-weight:400;color:var(--text3);margin-left:3px;font-size:12px}
.sep{flex:1;min-width:6px}
.stats{display:flex;gap:10px;font-size:12px;color:var(--text2);flex-shrink:0;white-space:nowrap}
.stats b{color:var(--text);font-weight:600}
.btn{padding:5px 10px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface);font-family:inherit;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0;line-height:1}
.btn:hover{border-color:var(--border2);background:var(--bg);color:var(--text)}
.btn-p{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-p:hover{background:#4F46E5;border-color:#4F46E5;color:#fff}
.btn-g{background:var(--green);border-color:var(--green);color:#fff}
.btn-g:hover{background:#059669;border-color:#059669;color:#fff}
.bi{width:26px;height:26px;padding:0;display:inline-flex;align-items:center;justify-content:center;font-size:13px;border-radius:var(--rs);border:1px solid transparent;background:transparent;cursor:pointer;color:var(--text3);transition:all .15s;font-family:inherit;line-height:1;flex-shrink:0}
.bi:hover{background:var(--bg);border-color:var(--border);color:var(--text2)}
.bi.d:hover{background:var(--danger-bg);border-color:var(--danger);color:var(--danger)}

/* sync indicator */
.sync-st{font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px;white-space:nowrap;flex-shrink:0;transition:all .3s}
.sync-st.ok{color:#059669;background:var(--green-bg)}
.sync-st.syncing{color:var(--text3);background:var(--bg)}
.sync-st.err{color:var(--danger);background:var(--danger-bg)}
.sync-st.off{display:none}

/* ── BOARD ── */
.board{flex:1;overflow-x:auto;overflow-y:hidden;display:flex;align-items:flex-start;gap:10px;padding:12px;-webkit-overflow-scrolling:touch}

/* ── COLUMN ── */
.col{width:var(--col);flex-shrink:0;background:#E8EDF2;border-radius:var(--r);border:1px solid var(--border);display:flex;flex-direction:column;max-height:calc(100dvh - 52px - 24px)}
.col-hdr{padding:9px 10px 8px;display:flex;align-items:center;gap:7px;flex-shrink:0}
.col-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.col-name{font-size:13px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.col-cnt{font-size:11px;font-weight:600;color:var(--text3);background:rgba(0,0,0,.09);padding:1px 6px;border-radius:999px;flex-shrink:0}
.col-body{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:4px;min-height:40px}
.col-body.dover{background:var(--accent-bg);outline:2px dashed var(--accent);outline-offset:-3px;border-radius:var(--rs)}
.col-ft{padding:6px;flex-shrink:0}
.btn-ac{width:100%;padding:6px 8px;border:1.5px dashed var(--border2);border-radius:var(--rs);background:transparent;font-family:inherit;font-size:12px;color:var(--text3);cursor:pointer;transition:all .15s;text-align:left;display:flex;align-items:center;gap:5px;min-height:36px}
.btn-ac:hover{background:var(--surface);border-color:var(--accent);color:var(--accent)}
.btn-newcol{width:160px;flex-shrink:0;height:40px;border:2px dashed var(--border2);border-radius:var(--r);background:transparent;font-family:inherit;font-size:12px;color:var(--text3);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;align-self:flex-start}
.btn-newcol:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}

/* ── ADULT CARD ── */
.acard{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:7px 9px;cursor:grab;transition:box-shadow .15s,border-color .15s,background .15s;position:relative;user-select:none;touch-action:none}
.acard:hover{border-color:var(--border2);box-shadow:var(--sh1)}
.acard.dragging{opacity:.4}
.acard.dover-reorder{border-top:3px solid var(--accent)}
.acard.child-mode{border-color:var(--green-bd)}
.acard.child-hover{border-color:var(--green);box-shadow:0 0 0 3px var(--green-bg);background:var(--green-bg)}
.card-row{display:flex;align-items:center;gap:6px}
.avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;letter-spacing:-.5px}
.card-name{font-size:13px;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-acts{display:none;gap:2px;align-items:center}
.acard:hover .card-acts,.ccard:hover .card-acts{display:flex}
.card-sub{margin-top:4px;padding-left:30px;font-size:11px;color:var(--text3);line-height:1.4}
.card-sub span{color:var(--text2)}
.move-sel{display:none;margin-top:5px;width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:11px;color:var(--text2);background:var(--bg);cursor:pointer;outline:none;min-height:30px}
@media(max-width:768px){
  .card-acts{display:flex !important}
  .move-sel{display:block}
  .acard,.ccard{touch-action:none}
}

/* ── FAMILY GROUP ── */
.fgroup{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--surface)}
.fgroup-parents{display:flex;flex-direction:column;gap:2px;padding:4px;background:#FAFBFC;border-bottom:1px dashed var(--border)}
.fgroup-children{padding:5px 9px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.fgroup-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-right:2px;flex-shrink:0}
.chip{display:inline-flex;align-items:center;gap:3px;background:var(--bg);border:1px solid var(--border);border-radius:999px;padding:2px 8px;font-size:11px;color:var(--text2);font-weight:500}

/* ── CHILD CARD ── */
.ccard{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:var(--rs);padding:7px 9px;cursor:grab;user-select:none;transition:box-shadow .15s;touch-action:none}
.ccard:hover{box-shadow:var(--sh1)}
.ccard.dragging{opacity:.4}
.child-name{font-size:13px;font-weight:600}
.child-age{font-size:11px;color:var(--text3)}
.child-parents{font-size:11px;color:var(--text2);margin-top:3px;font-style:italic;line-height:1.4}

/* ── CHILDREN COL ── */
.col.chlcol{border-color:var(--green-bd)}
.chlcol .col-hdr{background:var(--green-bg)}
.chlcol .col-name{color:#059669}

/* ── INLINE EDIT ── */
.ei{border:1.5px solid var(--accent);border-radius:4px;padding:2px 6px;font-family:inherit;font-size:13px;font-weight:600;color:var(--text);outline:none;background:#fff;width:100%;min-height:26px}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;padding:16px}
.overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--surface);border-radius:12px;padding:20px;width:100%;max-width:400px;box-shadow:var(--sh3);transform:scale(.95) translateY(-8px);transition:transform .2s;max-height:calc(100dvh - 32px);overflow-y:auto}
.overlay.open .modal{transform:scale(1) translateY(0)}
.modal-title{font-size:15px;font-weight:700;margin-bottom:14px}
.field{margin-bottom:10px}
.lbl{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.inp,.sel{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:14px;color:var(--text);background:#fff;outline:none;transition:border-color .15s;min-height:40px}
.inp:focus,.sel:focus{border-color:var(--accent)}
.modal-ft{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.modal-ft .btn{min-height:36px;font-size:13px}
.colors{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}
.cdot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border-color .15s,transform .1s;flex-shrink:0}
.cdot:hover{transform:scale(1.15)}
.cdot.sel{border-color:var(--text)}

/* ── TOUCH CLONE ── */
#tclone{position:fixed;pointer-events:none;z-index:9999;opacity:.88;transform:scale(1.06);box-shadow:0 12px 32px rgba(0,0,0,.25);border-radius:var(--rs)}

/* ── NOTIFICATION ── */
#notif{position:fixed;bottom:16px;right:16px;padding:9px 14px;border-radius:var(--r);color:#fff;font-size:13px;font-weight:600;box-shadow:var(--sh3);z-index:999;transform:translateY(60px);transition:transform .25s cubic-bezier(.34,1.56,.64,1);pointer-events:none;max-width:calc(100vw - 32px)}
#notif.show{transform:translateY(0)}
#notif.ok{background:#0F172A}
#notif.err{background:var(--danger)}

.empty-col{text-align:center;color:var(--text3);font-size:12px;padding:16px 8px;font-style:italic}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:999px}
</style>
</head>
<body>

<header class="hdr">
  <div class="brand">🎂 Festa do Vicente <small>· 1 ano</small></div>
  <div class="stats"><span><b id="hA">0</b> adultos</span><span><b id="hC">0</b> crianças</span><span><b id="hT">0</b> total</span></div>
  <div class="sep"></div>
  <div id="sync-st" class="sync-st off" title="Status Firebase"></div>
  <button class="btn" onclick="downloadTemplate()" title="Baixar modelo CSV para Excel">↓ Modelo Excel</button>
  <button class="btn" onclick="document.getElementById('csv-file').click()" title="Importar CSV preenchido">↑ Importar</button>
  <button class="btn" onclick="exportJSON()" title="Exportar todos os dados em JSON">↓ JSON</button>
  <button class="btn btn-p" onclick="openModal('adult')">+ Adulto</button>
  <button class="btn btn-g" onclick="openModal('child')">+ Criança</button>
</header>

<input type="file" id="csv-file" accept=".csv,.txt" style="display:none" onchange="handleImport(this)">
<div class="board" id="board"></div>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-title" id="mtitle"></div>
    <div id="mbody"></div>
    <div class="modal-ft">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-p" id="mok" onclick="confirmModal()">OK</button>
    </div>
  </div>
</div>

<div id="notif"></div>

<script>
// ══════════════════════════════════════════════════════
//  FIREBASE CONFIG
//  Siga as instruções no README ou nos comentários abaixo.
//  Substitua os valores a partir do console do Firebase.
// ══════════════════════════════════════════════════════
const FB_CONFIG = {
  apiKey:            "COLE_SUA_API_KEY",
  authDomain:        "SEU_PROJETO.firebaseapp.com",
  projectId:         "SEU_PROJETO_ID",
  storageBucket:     "SEU_PROJETO.appspot.com",
  messagingSenderId: "SEU_SENDER_ID",
  appId:             "SEU_APP_ID"
};
// ══════════════════════════════════════════════════════

const PAL=['#6366F1','#EC4899','#F59E0B','#10B981','#3B82F6','#8B5CF6','#EF4444','#0EA5E9','#F97316','#84CC16'];
const INIT={
  categories:[
    {id:'cat1',name:'Parentes Evelin',color:'#EC4899'},

  ],
  adults:[
    {id:'a1', name:'Evelin',         catId:'cat0',childrenIds:[]},

    {id:'a6', name:'Elcio',          catId:'cat0',childrenIds:[]},
    {id:'a7', name:'Claudia',        catId:'cat0',childrenIds:[]},
    {id:'a8', name:'Beatriz',        catId:'cat0',childrenIds:[]},
    {id:'a9', name:'Eliete',         catId:'cat0',childrenIds:[]},
    {id:'a10',name:'Claudia Márcia', catId:'cat0',childrenIds:[]},
    {id:'a11',name:'Marcelo',        catId:'cat0',childrenIds:[]},

    {id:'a13',name:'Marcio',         catId:'cat0',childrenIds:[]},
    {id:'a14',name:'Bárbara',        catId:'cat0',childrenIds:[]},
    {id:'a15',name:'Helena',         catId:'cat0',childrenIds:[]},
    {id:'a16',name:'Ricardo',        catId:'cat0',childrenIds:[]},
    {id:'a17',name:'Mãe do Ricardo', catId:'cat0',childrenIds:[]},
    {id:'a18',name:'Aninha',         catId:'cat0',childrenIds:[]},
    {id:'a19',name:'Heloísa',        catId:'cat0',childrenIds:[]},
    {id:'a20',name:'Chiquinho',      catId:'cat0',childrenIds:[]},
    {id:'a21',name:'Juliana',        catId:'cat0',childrenIds:[]},
    {id:'a22',name:'Billy',          catId:'cat0',childrenIds:[]},
    {id:'a23',name:'Fernanda',       catId:'cat0',childrenIds:[]},
    {id:'a24',name:'Cadu',           catId:'cat0',childrenIds:[]},
    {id:'a25',name:'Cida',           catId:'cat0',childrenIds:[]},
    {id:'a26',name:'Severino',       catId:'cat0',childrenIds:[]},
    {id:'a27',name:'Felipe',         catId:'cat0',childrenIds:[]},
    {id:'a28',name:'Fátima',         catId:'cat0',childrenIds:[]},
    {id:'a29',name:'Eliane',         catId:'cat0',childrenIds:[]},
    {id:'a30',name:'Tia Sandra',     catId:'cat0',childrenIds:[]},
    {id:'a31',name:'Bruna',          catId:'cat0',childrenIds:[]},
    {id:'a32',name:'Petter',         catId:'cat0',childrenIds:[]},

// ── STATE ─────────────────────────────────────────────
const LS_KEY='vp4';
function loadLocal(){
  try{const s=localStorage.getItem(LS_KEY);return s?JSON.parse(s):JSON.parse(JSON.stringify(INIT));}
  catch{return JSON.parse(JSON.stringify(INIT));}
}
let S=loadLocal();
function saveLocal(){try{localStorage.setItem(LS_KEY,JSON.stringify(S));}catch{}}
function uid(){return '_'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function initials(n){return(n||'').split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2);}
function nameColor(n){let h=0;for(let i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))&0xffffffff;return PAL[Math.abs(h)%PAL.length];}

// ── FIREBASE ──────────────────────────────────────────
const FB_ON = FB_CONFIG.apiKey !== 'COLE_SUA_API_KEY';
let db=null, docRef=null, _fbWritePending=false;

if(FB_ON){
  try{
    firebase.initializeApp(FB_CONFIG);
    db = firebase.firestore();
    // Cache offline para não re-ler desnecessariamente
    db.enablePersistence({synchronizeTabs:true}).catch(()=>{});
    docRef = db.collection('festa').doc('vicente');

    // Listener em tempo real: 1 leitura na conexão + 1 por mudança remota
    docRef.onSnapshot(snap=>{
      if(!snap.exists()){return;}
      if(_fbWritePending){return;} // ignora eco da própria escrita
      const remote=snap.data();
      if(JSON.stringify(remote)!==JSON.stringify(S)){
        S=remote;
        saveLocal();
        render();
      }
      setSyncSt('ok','Sincronizado');
    }, ()=>setSyncSt('err','Erro de conexão'));

    setSyncSt('syncing','Conectando...');
  } catch(e){
    setSyncSt('err','Firebase inválido');
    console.error('Firebase init error:',e);
  }
}

let _fbDebounce;
function syncToFB(){
  if(!FB_ON||!docRef)return;
  setSyncSt('syncing','Salvando...');
  _fbWritePending=true;
  clearTimeout(_fbDebounce);
  _fbDebounce=setTimeout(async()=>{
    try{
      await docRef.set(S);
      setSyncSt('ok','Sincronizado');
    } catch(e){
      setSyncSt('err','Erro ao salvar');
      console.error('FB write error:',e);
    } finally{
      // Libera o flag após o snapshot chegar (pequeno delay)
      setTimeout(()=>{_fbWritePending=false;},800);
    }
  },1200);
}

function setSyncSt(type,msg){
  const el=document.getElementById('sync-st');
  if(!el)return;
  el.className='sync-st '+type;
  el.textContent={ok:'● '+msg,syncing:'⟳ '+msg,err:'✕ '+msg}[type]||msg;
}

// save() = localStorage + Firebase
function save(){saveLocal();syncToFB();}

// ── DRAG STATE ────────────────────────────────────────
let drag=null;

// ── FAMILY GROUPS ─────────────────────────────────────
function getGroups(catId){
  const list=S.adults.filter(a=>a.catId===catId);
  const done=new Set();const out=[];
  for(const a of list){
    if(done.has(a.id))continue;
    const kids=a.childrenIds||[];
    if(!kids.length){out.push({type:'solo',adult:a});done.add(a.id);continue;}
    const co=list.filter(b=>!done.has(b.id)&&b.id!==a.id&&(b.childrenIds||[]).some(c=>kids.includes(c)));
    if(co.length){
      const mem=[a,...co];
      const allK=[...new Set(mem.flatMap(m=>m.childrenIds||[]))];
      out.push({type:'family',members:mem,childIds:allK});
      mem.forEach(m=>done.add(m.id));
    } else{out.push({type:'solo',adult:a});done.add(a.id);}
  }
  return out;
}

// ── RENDER ────────────────────────────────────────────
function renderACard(a){
  const kids=(a.childrenIds||[]).map(id=>S.children.find(c=>c.id===id)).filter(Boolean);
  const kHtml=kids.length?`<div class="card-sub">Pai/Mãe de: <span>${esc(kids.map(c=>c.name).join(', '))}</span></div>`:'';
  const catOpts=S.categories.map(c=>`<option value="${c.id}"${c.id===a.catId?' selected':''}>${esc(c.name)}</option>`).join('');
  return `<div class="acard" id="ac-${a.id}" draggable="true"
    ondragstart="dStart(event,'adult','${a.id}')" ondragend="dEnd()"
    ondragover="acOver(event,'${a.id}')" ondragleave="acLeave(event,'${a.id}')" ondrop="acDrop(event,'${a.id}')">
    <div class="card-row">
      <div class="avatar" style="background:${nameColor(a.name)}">${esc(initials(a.name))}</div>
      <div class="card-name" id="an-${a.id}">${esc(a.name)}</div>
      <div class="card-acts">
        <button class="bi" onclick="editAdult(event,'${a.id}')">✏</button>
        <button class="bi d" onclick="delAdult(event,'${a.id}')">✕</button>
      </div>
    </div>${kHtml}
    <select class="move-sel" onchange="moveAdult(event,'${a.id}')"><option value="">⤴ Mover para...</option>${catOpts}</select>
  </div>`;
}

function renderFGroup(g){
  const chips=g.childIds.map(id=>{const c=S.children.find(x=>x.id===id);return c?`<span class="chip">👶 ${esc(c.name)}, ${esc(c.age)}</span>`:''}).join('');
  return `<div class="fgroup"><div class="fgroup-parents">${g.members.map(m=>renderACard(m)).join('')}</div>
    <div class="fgroup-children"><span class="fgroup-lbl">Filhos</span>${chips||'<span style="font-size:11px;color:var(--text3);font-style:italic">nenhum vinculado</span>'}</div></div>`;
}

function renderCol(cat){
  const grps=getGroups(cat.id);
  const cnt=S.adults.filter(a=>a.catId===cat.id).length;
  const body=grps.length?grps.map(g=>g.type==='solo'?renderACard(g.adult):renderFGroup(g)).join(''):`<div class="empty-col">Arraste convidados aqui</div>`;
  const sys=cat.id==='cat0';
  const btns=sys?'':`<button class="bi" onclick="editCat('${cat.id}')">✏</button><button class="bi d" onclick="delCat('${cat.id}')">✕</button>`;
  return `<div class="col" id="col-${cat.id}">
    <div class="col-hdr"><div class="col-dot" style="background:${cat.color}"></div><div class="col-name">${esc(cat.name)}</div><div class="col-cnt">${cnt}</div>${btns}</div>
    <div class="col-body" id="cb-${cat.id}" ondragover="colOver(event,'${cat.id}')" ondragleave="colLeave(event,'${cat.id}')" ondrop="colDrop(event,'${cat.id}')">${body}</div>
    <div class="col-ft"><button class="btn-ac" onclick="openModal('adult','${cat.id}')">＋ Adulto</button></div>
  </div>`;
}

function renderChildCol(){
  const cards=S.children.map(c=>{
    const pn=S.adults.filter(a=>(a.childrenIds||[]).includes(c.id)).map(a=>a.name);
    const pt=pn.length?`Filho(a) de ${pn.join(' e ')}`:'Sem pais · arraste para um adulto para vincular';
    return `<div class="ccard" id="cc-${c.id}" draggable="true" ondragstart="dStart(event,'child','${c.id}')" ondragend="dEnd()">
      <div class="card-row">
        <div class="avatar" style="background:var(--green)">${esc(initials(c.name))}</div>
        <div style="flex:1;min-width:0"><div class="child-name" id="cn-${c.id}">${esc(c.name)}</div><div class="child-age">${esc(c.age)}</div></div>
        <div class="card-acts">
          <button class="bi" onclick="editChild(event,'${c.id}')">✏</button>
          <button class="bi d" onclick="delChild(event,'${c.id}')">✕</button>
        </div>
      </div>
      <div class="child-parents">${esc(pt)}</div>
    </div>`;
  }).join('')||`<div class="empty-col">Nenhuma criança</div>`;
  return `<div class="col chlcol">
    <div class="col-hdr"><div class="col-dot" style="background:var(--green)"></div><div class="col-name">Crianças</div><div class="col-cnt">${S.children.length}</div></div>
    <div class="col-body" id="cb-children">${cards}</div>
    <div class="col-ft"><button class="btn-ac" onclick="openModal('child')" style="border-color:var(--green);color:var(--green)">＋ Criança</button></div>
  </div>`;
}

function render(){
  const b=document.getElementById('board');
  b.innerHTML=S.categories.map(renderCol).join('')+renderChildCol()+
    `<button class="btn-newcol" onclick="openModal('category')">＋ Nova Categoria</button>`;
  document.getElementById('hA').textContent=S.adults.length;
  document.getElementById('hC').textContent=S.children.length;
  document.getElementById('hT').textContent=S.adults.length+S.children.length;
}

// ── MOUSE DRAG & DROP ─────────────────────────────────
function dStart(e,type,id){
  drag={type,id};e.dataTransfer.effectAllowed='move';
  setTimeout(()=>{
    document.getElementById((type==='adult'?'ac-':'cc-')+id)?.classList.add('dragging');
    if(type==='child')document.querySelectorAll('.acard').forEach(el=>el.classList.add('child-mode'));
  },0);
}
function dEnd(){
  document.querySelectorAll('.dragging,.child-mode,.child-hover,.dover,.dover-reorder')
    .forEach(el=>el.classList.remove('dragging','child-mode','child-hover','dover','dover-reorder'));
  drag=null;
}
function colOver(e,catId){if(!drag||drag.type!=='adult')return;e.preventDefault();e.stopPropagation();document.getElementById('cb-'+catId)?.classList.add('dover');}
function colLeave(e,catId){const el=document.getElementById('cb-'+catId);if(el&&!el.contains(e.relatedTarget))el.classList.remove('dover');}
function colDrop(e,catId){
  e.preventDefault();e.stopPropagation();
  if(!drag||drag.type!=='adult')return;
  const a=S.adults.find(x=>x.id===drag.id);
  if(a){a.catId=catId;save();render();notify('Movido para '+S.categories.find(c=>c.id===catId)?.name);}
}
function acOver(e,aid){
  if(!drag)return;e.preventDefault();e.stopPropagation();
  if(drag.type==='child'){document.querySelectorAll('.child-hover').forEach(el=>el.classList.remove('child-hover'));document.getElementById('ac-'+aid)?.classList.add('child-hover');}
  else if(drag.type==='adult'&&drag.id!==aid){document.querySelectorAll('.dover-reorder').forEach(el=>el.classList.remove('dover-reorder'));document.getElementById('ac-'+aid)?.classList.add('dover-reorder');}
}
function acLeave(e,aid){const card=document.getElementById('ac-'+aid);if(card&&!card.contains(e.relatedTarget))card.classList.remove('child-hover','dover-reorder');}
function acDrop(e,aid){
  e.preventDefault();e.stopPropagation();if(!drag)return;
  if(drag.type==='child'){linkChild(drag.id,aid);}
  else if(drag.type==='adult'&&drag.id!==aid){
    const di=S.adults.findIndex(a=>a.id===drag.id);
    const [moved]=S.adults.splice(di,1);
    const newTi=S.adults.findIndex(a=>a.id===aid);
    moved.catId=S.adults[newTi]?.catId||moved.catId;
    S.adults.splice(newTi,0,moved);
    save();render();
  }
}

// ── TOUCH DRAG ────────────────────────────────────────
let tD=null,tCl=null;
document.addEventListener('touchstart',e=>{
  const card=e.target.closest('.acard,.ccard');
  if(!card||e.target.closest('.bi,.move-sel,.ei,.btn-ac'))return;
  if(e.touches.length!==1)return;
  const isA=card.classList.contains('acard');
  const id=card.id.replace(isA?'ac-':'cc-','');
  const t=e.touches[0];
  tD={type:isA?'adult':'child',id,sx:t.clientX,sy:t.clientY,active:false,card};
  tD.timer=setTimeout(()=>{
    if(!tD)return;tD.active=true;
    const r=card.getBoundingClientRect();
    tCl=card.cloneNode(true);tCl.id='tclone';
    tCl.style.cssText=`width:${r.width}px;top:${r.top}px;left:${r.left}px`;
    document.body.appendChild(tCl);card.style.opacity='.35';
    tD.ox=t.clientX-r.left;tD.oy=t.clientY-r.top;
    if(tD.type==='child')document.querySelectorAll('.acard').forEach(el=>el.classList.add('child-mode'));
  },180);
},{passive:true});
document.addEventListener('touchmove',e=>{
  if(!tD)return;
  const t=e.touches[0];
  if(!tD.active){if(Math.abs(t.clientX-tD.sx)>8||Math.abs(t.clientY-tD.sy)>8){clearTimeout(tD.timer);tD=null;}return;}
  e.preventDefault();
  if(tCl){tCl.style.top=(t.clientY-tD.oy)+'px';tCl.style.left=(t.clientX-tD.ox)+'px';}
  if(tCl)tCl.style.display='none';
  const under=document.elementFromPoint(t.clientX,t.clientY);
  if(tCl)tCl.style.display='';
  document.querySelectorAll('.child-hover,.dover-reorder,.dover').forEach(el=>el.classList.remove('child-hover','dover-reorder','dover'));
  if(tD.type==='child'){under?.closest('.acard')?.classList.add('child-hover');}
  else{const tc=under?.closest('.acard'),tb=under?.closest('.col-body');
    if(tc&&tc.id!=='ac-'+tD.id)tc.classList.add('dover-reorder');
    else if(tb)tb.classList.add('dover');}
},{passive:false});
document.addEventListener('touchend',e=>{
  if(!tD)return;clearTimeout(tD.timer);
  if(!tD.active){tD=null;return;}
  const t=e.changedTouches[0];
  if(tCl){document.body.removeChild(tCl);tCl=null;}
  if(tD.card)tD.card.style.opacity='';
  const under=document.elementFromPoint(t.clientX,t.clientY);
  if(tD.type==='child'){const tc=under?.closest('.acard');if(tc)linkChild(tD.id,tc.id.replace('ac-',''));}
  else{
    const tc=under?.closest('.acard'),tb=under?.closest('.col-body');
    const fake={preventDefault:()=>{},stopPropagation:()=>{}};
    const sv=drag;drag=tD;
    if(tc&&tc.id!=='ac-'+tD.id)acDrop(fake,tc.id.replace('ac-',''));
    else if(tb){const cid=tb.id.replace('cb-','');if(cid!=='children')colDrop(fake,cid);}
    drag=sv;
  }
  document.querySelectorAll('.child-mode,.child-hover,.dover,.dover-reorder').forEach(el=>el.classList.remove('child-mode','child-hover','dover','dover-reorder'));
  tD=null;
},{passive:true});

// ── LINK CHILD ────────────────────────────────────────
function linkChild(cid,aid){
  const a=S.adults.find(x=>x.id===aid),c=S.children.find(x=>x.id===cid);
  if(!a||!c)return;
  if(!a.childrenIds)a.childrenIds=[];if(!c.parentIds)c.parentIds=[];
  if(!a.childrenIds.includes(cid))a.childrenIds.push(cid);
  if(!c.parentIds.includes(aid))c.parentIds.push(aid);
  save();render();notify(`${c.name} vinculado(a) a ${a.name}`);
}

// ── MOBILE MOVE ───────────────────────────────────────
function moveAdult(e,id){
  const catId=e.target.value;if(!catId)return;
  const a=S.adults.find(x=>x.id===id);
  if(a){a.catId=catId;save();render();notify('Movido para '+S.categories.find(c=>c.id===catId)?.name);}
}

// ── INLINE EDIT ───────────────────────────────────────
function editAdult(e,id){
  e.stopPropagation();
  const a=S.adults.find(x=>x.id===id),el=document.getElementById('an-'+id);if(!a||!el)return;
  el.innerHTML=`<input class="ei" id="ei-${id}" value="${esc(a.name)}" onkeydown="saveAdult(event,'${id}')">`;
  document.getElementById('ei-'+id).focus();
}
function saveAdult(e,id){
  if(e.key==='Escape'){render();return;}if(e.key!=='Enter')return;
  const v=document.getElementById('ei-'+id)?.value.trim();if(!v){notify('Nome não pode ser vazio','err');return;}
  const a=S.adults.find(x=>x.id===id);if(a)a.name=v;save();render();notify('Nome atualizado');
}
function editChild(e,id){
  e.stopPropagation();
  const c=S.children.find(x=>x.id===id),el=document.getElementById('cn-'+id);if(!c||!el)return;
  el.innerHTML=`<input class="ei" id="ei-${id}" value="${esc(c.name)}" onkeydown="saveChild(event,'${id}')">`;
  document.getElementById('ei-'+id).focus();
}
function saveChild(e,id){
  if(e.key==='Escape'){render();return;}if(e.key!=='Enter')return;
  const v=document.getElementById('ei-'+id)?.value.trim();if(!v){notify('Nome não pode ser vazio','err');return;}
  const c=S.children.find(x=>x.id===id);if(c)c.name=v;save();render();notify('Nome atualizado');
}

// ── DELETE ────────────────────────────────────────────
function delAdult(e,id){
  e.stopPropagation();const a=S.adults.find(x=>x.id===id);
  if(!a||!confirm(`Remover "${a.name}"?`))return;
  S.adults=S.adults.filter(x=>x.id!==id);
  S.children.forEach(c=>{c.parentIds=(c.parentIds||[]).filter(p=>p!==id);});
  save();render();notify(`${a.name} removido(a)`);
}
function delChild(e,id){
  e.stopPropagation();const c=S.children.find(x=>x.id===id);
  if(!c||!confirm(`Remover "${c.name}"?`))return;
  S.children=S.children.filter(x=>x.id!==id);
  S.adults.forEach(a=>{a.childrenIds=(a.childrenIds||[]).filter(k=>k!==id);});
  save();render();notify(`${c.name} removido(a)`);
}
function delCat(id){
  if(id==='cat0')return;const cat=S.categories.find(c=>c.id===id);if(!cat)return;
  const n=S.adults.filter(a=>a.catId===id).length;
  if(!confirm(`Excluir "${cat.name}"?${n?`\n${n} adulto(s) vão para Sem Categoria`:''}`))return;
  S.adults.forEach(a=>{if(a.catId===id)a.catId='cat0';});
  S.categories=S.categories.filter(c=>c.id!==id);save();render();notify(`"${cat.name}" excluída`);
}
function editCat(id){openModal('editCategory',id);}

// ── MODAL ─────────────────────────────────────────────
let mCtx={};
function openModal(type,arg){
  mCtx={type};
  if(type==='adult')mCtx.defCat=arg||'cat0';
  if(type==='editCategory')mCtx.catId=arg;
  const ti=document.getElementById('mtitle'),bd=document.getElementById('mbody'),ok=document.getElementById('mok');
  if(type==='adult'){
    ti.textContent='Adicionar Adulto';ok.textContent='Adicionar';
    const opts=S.categories.map(c=>`<option value="${c.id}"${c.id===mCtx.defCat?' selected':''}>${esc(c.name)}</option>`).join('');
    bd.innerHTML=`<div class="field"><label class="lbl">Nome</label><input class="inp" id="mi-name" autocomplete="off" placeholder="Nome do convidado"></div>
    <div class="field"><label class="lbl">Categoria</label><select class="sel" id="mi-cat">${opts}</select></div>`;
  } else if(type==='child'){
    ti.textContent='Adicionar Criança';ok.textContent='Adicionar';
    const po=S.adults.map(a=>`<option value="${a.id}">${esc(a.name)}</option>`).join('');
    bd.innerHTML=`<div class="field"><label class="lbl">Nome</label><input class="inp" id="mi-name" autocomplete="off" placeholder="Nome da criança"></div>
    <div class="field"><label class="lbl">Idade</label><input class="inp" id="mi-age" placeholder="Ex: 5 anos, 3 meses"></div>
    <div class="field"><label class="lbl">Pai / Mãe 1 (opcional)</label><select class="sel" id="mi-p1"><option value="">— nenhum —</option>${po}</select></div>
    <div class="field"><label class="lbl">Pai / Mãe 2 (opcional)</label><select class="sel" id="mi-p2"><option value="">— nenhum —</option>${po}</select></div>`;
  } else if(type==='category'||type==='editCategory'){
    const isE=type==='editCategory';const cat=isE?S.categories.find(c=>c.id===mCtx.catId):null;
    ti.textContent=isE?'Editar Categoria':'Nova Categoria';ok.textContent=isE?'Salvar':'Criar';
    const dots=PAL.map(col=>`<div class="cdot${(cat?.color||PAL[0])===col?' sel':''}" style="background:${col}" data-c="${col}" onclick="pickColor('${col}')"></div>`).join('');
    bd.innerHTML=`<div class="field"><label class="lbl">Nome</label><input class="inp" id="mi-catname" value="${esc(cat?.name||'')}" placeholder="Ex: Amigos do trabalho" autocomplete="off"></div>
    <div class="field"><label class="lbl">Cor</label><div class="colors">${dots}</div><input type="hidden" id="mi-color" value="${cat?.color||PAL[0]}"></div>`;
  }
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.querySelector('#mbody .inp')?.focus(),60);
}
function pickColor(c){
  document.getElementById('mi-color').value=c;
  document.querySelectorAll('.cdot').forEach(d=>d.classList.toggle('sel',d.dataset.c===c));
}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeModal();}
function confirmModal(){
  const t=mCtx.type;
  if(t==='adult'){
    const name=document.getElementById('mi-name').value.trim();const catId=document.getElementById('mi-cat').value;
    if(!name){notify('Informe o nome','err');return;}
    S.adults.push({id:uid(),name,catId,childrenIds:[]});save();closeModal();render();notify(`${name} adicionado(a)`);
  } else if(t==='child'){
    const name=document.getElementById('mi-name').value.trim();const age=document.getElementById('mi-age').value.trim();
    const p1=document.getElementById('mi-p1').value;const p2=document.getElementById('mi-p2').value;
    if(!name){notify('Informe o nome','err');return;}if(!age){notify('Informe a idade','err');return;}
    const cid=uid();const pids=[...new Set([p1,p2].filter(p=>p))];
    S.children.push({id:cid,name,age,parentIds:pids});
    pids.forEach(pid=>{const a=S.adults.find(x=>x.id===pid);if(a){if(!a.childrenIds)a.childrenIds=[];if(!a.childrenIds.includes(cid))a.childrenIds.push(cid);}});
    save();closeModal();render();notify(`${name} adicionado(a)`);
  } else if(t==='category'){
    const name=document.getElementById('mi-catname').value.trim();const color=document.getElementById('mi-color').value;
    if(!name){notify('Informe o nome','err');return;}
    S.categories.push({id:uid(),name,color});save();closeModal();render();notify(`"${name}" criada`);
  } else if(t==='editCategory'){
    const name=document.getElementById('mi-catname').value.trim();const color=document.getElementById('mi-color').value;
    if(!name){notify('Informe o nome','err');return;}
    const cat=S.categories.find(c=>c.id===mCtx.catId);if(cat){cat.name=name;cat.color=color;}
    save();closeModal();render();notify('Categoria atualizada');
  }
}
document.addEventListener('keydown',e=>{
  if(!document.getElementById('overlay').classList.contains('open'))return;
  if(e.key==='Escape')closeModal();
  else if(e.key==='Enter'&&e.target.tagName!=='SELECT')confirmModal();
});

// ── CSV IMPORT ────────────────────────────────────────
function handleImport(input){
  const f=input.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=e=>{try{importCSV(e.target.result);}catch(err){notify('Erro: '+err.message,'err');}input.value='';};
  reader.readAsText(f,'UTF-8');
}
function csvRow(line){
  const out=[];let cur='',q=false;
  for(let i=0;i<line.length;i++){const c=line[i];
    if(c==='"'){if(q&&line[i+1]==='"'){cur+='"';i++;}else q=!q;}
    else if(c===','&&!q){out.push(cur.trim());cur='';}else cur+=c;}
  out.push(cur.trim());return out;
}
function importCSV(raw){
  const text=raw.replace(/^﻿/,'');
  const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));
  if(!lines.length){notify('Arquivo vazio','err');return;}
  const hdr=csvRow(lines[0]).map(h=>h.toLowerCase().replace(/[^\w]/g,'_').replace(/_+/g,'_'));
  let nA=0,nC=0,nS=0;
  for(let i=1;i<lines.length;i++){
    const vals=csvRow(lines[i]);
    const row=Object.fromEntries(hdr.map((h,j)=>[h,vals[j]||'']));
    const tipo=(row.tipo||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
    const nome=(row.nome||'').trim();if(!nome||!tipo){nS++;continue;}
    if(tipo==='adulto'){
      const cn=(row.categoria||'').trim();
      const cat=S.categories.find(c=>c.name.toLowerCase()===cn.toLowerCase())||{id:'cat0'};
      S.adults.push({id:uid(),name:nome,catId:cat.id,childrenIds:[]});nA++;
    } else if(tipo.startsWith('crian')||tipo==='crianca'){
      const age=(row.idade||row.age||'').trim();
      const p1n=(row.responsavel_1||row.pai_mae_1||'').trim();
      const p2n=(row.responsavel_2||row.pai_mae_2||'').trim();
      const p1=S.adults.find(a=>a.name.toLowerCase()===p1n.toLowerCase());
      const p2=p2n?S.adults.find(a=>a.name.toLowerCase()===p2n.toLowerCase()):null;
      const pids=[p1?.id,p2?.id].filter(Boolean);
      const cid=uid();
      S.children.push({id:cid,name:nome,age:age||'?',parentIds:pids});
      pids.forEach(pid=>{const a=S.adults.find(x=>x.id===pid);if(a){if(!a.childrenIds)a.childrenIds=[];if(!a.childrenIds.includes(cid))a.childrenIds.push(cid);}});
      nC++;
    } else nS++;
  }
  save();render();
  notify(`Importado: ${nA} adulto(s), ${nC} criança(s)${nS?' · '+nS+' ignorada(s)':''}`);
}

// ── UTILS ─────────────────────────────────────────────
function dl(content,mime,filename){
  const b=new Blob([content],{type:mime});const url=URL.createObjectURL(b);
  const a=document.createElement('a');a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
function now(){return new Date().toISOString().slice(0,10);}

// ── NOTIFICATION ──────────────────────────────────────
let _nt;
function notify(msg,type='ok'){
  const el=document.getElementById('notif');
  el.textContent=msg;el.className='notif '+type+' show';
  clearTimeout(_nt);_nt=setTimeout(()=>el.classList.remove('show'),3000);
}

// ── INIT ──────────────────────────────────────────────
render();
</script>
