<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Festa do Vicente · 1 ano</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F7F8FA;--surface:#fff;--surface2:#FAFBFC;--border:#EAECEF;--border2:#DADEE3;
  --text:#222933;--text2:#5B636E;--text3:#9AA1AC;
  --accent:#5B6CF0;--accent-bg:#F1F3FE;--accent-bd:#D6DCFB;
  --green:#3FA980;
  --sh1:0 1px 2px rgba(16,24,40,.05);--sh2:0 4px 14px rgba(16,24,40,.07);--sh3:0 12px 28px rgba(16,24,40,.14);
  --r:10px;--rs:7px
}
html{overflow-x:hidden}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;-webkit-tap-highlight-color:transparent;overflow-x:hidden;max-width:100vw}
button,input,select{font-family:inherit}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:30}
.brand{font-size:15px;font-weight:700;white-space:nowrap;color:var(--text);flex-shrink:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
.brand small{font-weight:500;color:var(--text3);margin-left:4px;font-size:12px}
.sep{flex:1;min-width:4px}
.stats{display:flex;gap:6px;white-space:nowrap;flex-shrink:0}
.stats .stat{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--text2);background:var(--surface2);border:1px solid var(--border2);padding:3px 9px;border-radius:999px}
.stats .stat b{color:var(--text);font-weight:800}
.stats .tot{background:var(--accent-bg);border-color:var(--accent-bd);color:var(--accent)}
.stats .tot b{color:var(--accent)}
.hdr-acts{display:flex;align-items:center;gap:8px}
.btn{padding:7px 13px;border-radius:var(--rs);border:1px solid var(--border2);background:var(--surface);font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;line-height:1;min-height:32px}
.btn:hover{background:var(--surface2);border-color:var(--text3);color:var(--text)}
.btn-p{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-p:hover{background:#4856d6;border-color:#4856d6;color:#fff}
.bi{width:26px;height:26px;padding:0;display:inline-flex;align-items:center;justify-content:center;font-size:12px;border-radius:6px;border:1px solid transparent;background:transparent;cursor:pointer;color:var(--text3);transition:all .15s;line-height:1;flex-shrink:0}
.bi:hover{background:var(--surface2);border-color:var(--border);color:var(--text2)}
.bi.d:hover{background:#FCF3F3;border-color:#F0CECC;color:#D9534F}
.sync-st{font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px;white-space:nowrap;transition:all .3s}
.sync-st.ok{color:#3FA980;background:#EDF7F2}
.sync-st.syncing{color:var(--text3);background:var(--surface2)}
.sync-st.err{color:#D9534F;background:#FCF3F3}
.sync-st.off{display:none}

/* TOOLS */
.tools{background:var(--surface);border-bottom:1px solid var(--border);padding:9px 14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.searchbox{position:relative;flex:1;min-width:200px}
.searchbox input{width:100%;height:36px;padding:0 12px 0 32px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--surface2);outline:none;font-size:13px;color:var(--text);transition:all .15s}
.searchbox input:focus{border-color:var(--accent);background:#fff}
.searchbox span{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.fsel{height:36px;padding:0 11px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--surface2);font-size:12px;font-weight:600;color:var(--text2);outline:none;max-width:180px}
.fsel:focus{border-color:var(--accent);background:#fff}
.segment{display:flex;gap:2px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--rs);padding:2px}
.seg{border:0;background:transparent;border-radius:5px;padding:7px 13px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .15s}
.seg.active{background:#fff;color:var(--accent);box-shadow:var(--sh1)}

/* BOARD */
.board{display:flex;flex-wrap:wrap;align-items:flex-start;gap:10px;padding:12px;-webkit-overflow-scrolling:touch}

/* COLUMN */
.col{flex:1;min-width:230px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;box-shadow:var(--sh1)}
.col-hdr{padding:9px 11px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.col-name{font-size:12.5px;font-weight:800;flex:1;color:var(--text);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.col-cnt{font-size:12px;font-weight:800;color:var(--text2);background:var(--surface2);border:1px solid var(--border2);padding:2px 9px;border-radius:999px;flex-shrink:0}
.col-hdr .bi{opacity:0;transition:opacity .15s}
.col:hover .col-hdr .bi{opacity:1}
.col-chev{display:none;font-size:11px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.col.collapsed .col-chev{transform:rotate(-90deg)}
.col.collapsed .col-body,.col.collapsed .col-ft{display:none}
.col-body{padding:5px;display:flex;flex-direction:column;gap:3px;min-height:40px}
.col-body.dover{background:var(--accent-bg);outline:2px dashed var(--accent-bd);outline-offset:-3px;border-radius:var(--rs)}
.col-ft{padding:6px;border-top:1px solid var(--border)}
.btn-ac{width:100%;padding:7px;border:1px dashed var(--border2);border-radius:var(--rs);background:transparent;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;min-height:34px}
.btn-ac:hover,.btn-ac.dover-ac{background:var(--accent-bg);border-color:var(--accent-bd);color:var(--accent)}
.btn-newcol{width:180px;flex-shrink:0;min-height:44px;border:1px dashed var(--border2);border-radius:var(--r);background:transparent;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;align-self:flex-start}
.btn-newcol:hover{border-color:var(--accent-bd);color:var(--accent);background:var(--accent-bg)}
.empty-col{text-align:center;color:var(--text3);font-size:12px;padding:14px 8px}

/* CARD — linha fina */
.acard{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:5px 9px;cursor:grab;transition:background .12s,border-color .12s;user-select:none;touch-action:pan-y}
.acard:hover{background:var(--surface2);border-color:var(--border2)}
.acard.dragging{opacity:.4}
.acard.child-mode{border-color:#BFE3D3}
.acard.child-hover{border-color:var(--green);background:#EDF7F2}
.acard.dover-couple{outline:2px solid var(--accent);outline-offset:-1px;background:var(--accent-bg)}
.ins-before{box-shadow:0 -3px 0 -1px var(--accent)}
.ins-after{box-shadow:0 3px 0 -1px var(--accent)}
.card-row{display:flex;align-items:center;gap:8px;min-height:22px}
.st-dot{width:9px;height:9px;border-radius:50%;border:none;padding:0;cursor:pointer;flex-shrink:0}
.card-name{font-size:13px;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.st-lbl{font-size:11px;color:var(--text3);font-weight:500;flex-shrink:0;cursor:pointer}
.child-age{font-size:11px;color:var(--text3);font-weight:500;flex-shrink:0}
.card-acts{display:none;gap:1px;align-items:center;flex-shrink:0}
.acard:hover .card-acts,.ccard:hover .card-acts{display:flex}
.acard:hover .st-lbl,.ccard:hover .child-age{display:none}
.kids-sub{margin-top:1px;padding-left:17px;font-size:11px;color:var(--text3);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* FAMILY / COUPLE GROUP — tom bem suave para identificar */
.fgroup{border:1px solid var(--border2);border-radius:var(--rs);overflow:hidden;background:var(--surface)}
.fgroup.dragging{opacity:.4}
.fgroup.is-couple{background:#FEF6FA;border-color:#F0D7E4}
.fgroup.is-couple .fgroup-hdr{background:#FCEEF5;border-bottom-color:#F0D7E4;color:#B06A8C}
.fgroup.is-family{background:#F5F7FE;border-color:#DEE3FA}
.fgroup.is-family .fgroup-hdr{background:#EEF1FD;border-bottom-color:#DEE3FA;color:#6D77B8}
.fgroup-hdr{font-size:10px;font-weight:700;padding:4px 9px;display:flex;align-items:center;gap:5px;background:var(--surface2);border-bottom:1px solid var(--border);color:var(--text3);text-transform:uppercase;letter-spacing:.05em;cursor:grab;user-select:none}
.fgroup-hdr small{font-size:9px;color:var(--text3);font-weight:400;margin-left:auto;text-transform:none;letter-spacing:0}
.fgroup-hdr .fg-x{width:18px;height:18px;font-size:10px;margin-left:6px;color:var(--text3)}
.fgroup-hdr .fg-x:hover{background:#FCF3F3;border-color:#F0CECC;color:#D9534F}
.fgroup-parents{display:flex;flex-direction:column;gap:2px;padding:3px}
.fgroup-parents .acard{border-color:transparent;background:transparent}
.fgroup-parents .acard:hover{background:var(--surface2)}
.fgroup-children{padding:4px 9px 5px 17px;font-size:11px;color:var(--text3);line-height:1.3;border-top:1px dashed var(--border)}

/* CHILD CARD */
.ccard{background:#F3FAF7;border:1px solid #DCEEE6;border-radius:var(--rs);padding:5px 9px;cursor:grab;user-select:none;transition:background .12s,border-color .12s;touch-action:pan-y}
.ccard:hover{background:#EAF6F0;border-color:#C8E5D8}
.ccard.dragging{opacity:.4}
.child-parents{font-size:11px;color:var(--text3);margin-top:1px;padding-left:17px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(34,41,51,.4);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;padding:16px}
.overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--surface);border-radius:14px;padding:22px;width:100%;max-width:430px;box-shadow:var(--sh3);transform:scale(.96) translateY(-6px);transition:transform .2s;max-height:calc(100dvh - 32px);overflow-y:auto}
.overlay.open .modal{transform:scale(1) translateY(0)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.field{margin-bottom:13px}
.lbl{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.inp,.sel{width:100%;padding:10px 11px;border:1px solid var(--border2);border-radius:var(--rs);font-size:14px;color:var(--text);background:#fff;outline:none;transition:border-color .15s;min-height:42px}
.inp:focus,.sel:focus{border-color:var(--accent)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-ft{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.modal-ft .btn{min-height:40px;font-size:13px}
.modal-ft .btn-p{background:var(--accent);border-color:var(--accent);color:#fff}
.modal-ft .btn-p:hover{background:#4856d6;border-color:#4856d6;color:#fff}
.colors{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.cdot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border-color .15s,transform .1s;flex-shrink:0}
.cdot:hover{transform:scale(1.12)}
.cdot.sel{border-color:var(--text)}

/* MOBILE */
.fab{display:none;position:fixed;right:16px;bottom:16px;width:54px;height:54px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:28px;font-weight:300;line-height:1;box-shadow:0 6px 18px rgba(91,108,240,.4);cursor:pointer;z-index:150;align-items:center;justify-content:center;transition:transform .15s}
.fab:active{transform:scale(.9)}
.sheet-ov{display:none;position:fixed;inset:0;background:rgba(34,41,51,.45);z-index:160;opacity:0;pointer-events:none;transition:opacity .2s}
.sheet-ov.open{opacity:1;pointer-events:auto}
.sheet{position:absolute;left:0;right:0;bottom:0;background:var(--surface);border-radius:20px 20px 0 0;padding:12px 16px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -8px 30px rgba(0,0,0,.15);transform:translateY(110%);transition:transform .28s cubic-bezier(.34,1.4,.5,1);display:flex;flex-direction:column;gap:8px}
.sheet-ov.open .sheet{transform:translateY(0)}
.sheet-grab{width:38px;height:4px;border-radius:999px;background:var(--border2);margin:2px auto 10px}
.sheet-btn{display:flex;align-items:center;gap:12px;width:100%;padding:14px;border:1px solid var(--border2);border-radius:12px;background:var(--surface);font-size:15px;font-weight:600;color:var(--text);cursor:pointer;text-align:left}
.sheet-btn:active{background:var(--surface2)}
.sheet-btn.p{background:var(--accent-bg);border-color:var(--accent-bd);color:var(--accent)}

#tclone{position:fixed;pointer-events:none;z-index:9999;opacity:.9;box-shadow:var(--sh3);border-radius:var(--rs)}
#notif{position:fixed;bottom:16px;right:16px;padding:10px 14px;border-radius:var(--rs);color:#fff;font-size:13px;font-weight:600;box-shadow:var(--sh3);z-index:999;transform:translateY(60px);transition:transform .25s cubic-bezier(.34,1.56,.64,1);pointer-events:none;max-width:calc(100vw - 32px)}
#notif.show{transform:translateY(0)}
#notif.ok{background:#222933}
#notif.err{background:#D9534F}
::-webkit-scrollbar{width:7px;height:7px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:999px}

@media(max-width:768px){
  .hdr{height:50px;padding:0 12px;gap:8px}
  .brand{font-size:14px}
  .stats{gap:5px}
  .stats .stat{font-size:11px;padding:2px 7px}
  .hdr-acts{display:none}
  .fab{display:flex}
  .sheet-ov{display:block}
  .tools{padding:8px 10px;gap:6px}
  .searchbox{min-width:100%;order:1}
  .fsel{flex:1;min-width:0;max-width:none}
  .segment{order:4;width:100%}
  .seg{flex:1}
  .board{flex-direction:column;flex-wrap:nowrap;align-items:stretch;padding:10px 10px 90px;gap:8px}
  .col{width:100%;min-width:0;flex:none}
  .col-hdr{cursor:pointer}
  .col-hdr .bi{opacity:1}
  .col-chev{display:block}
  .btn-newcol{width:100%}
  .card-acts{display:flex!important}
  .acard .st-lbl,.ccard .child-age{display:none}
  .modal{border-radius:16px;padding:18px}
  .form-grid{grid-template-columns:1fr}
  #notif{bottom:84px;left:12px;right:12px;max-width:none;text-align:center}
}
@media(max-width:430px){
  .stats .s-ad,.stats .s-ch{display:none}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="brand">🎂 <span>Festa do Vicente</span> <small>· 1 ano</small></div>
  <div class="stats"><span class="stat s-ad"><b id="hA">0</b> adultos</span><span class="stat s-ch"><b id="hC">0</b> crianças</span><span class="stat tot"><b id="hT">0</b> total</span></div>
  <div class="sep"></div>
  <div id="sync-st" class="sync-st off"></div>
  <div class="hdr-acts">
    <button class="btn" style="background:linear-gradient(135deg,#FF6B35,#FFA600);border-color:#FF6B35;color:#fff;box-shadow:0 2px 8px rgba(255,107,53,.3)" onclick="exportPartyListHTML()">🦁 Lista da Festa</button>
    <button class="btn btn-p" onclick="openModal('adult')">+ Adulto</button>
    <button class="btn" onclick="openModal('child')">+ Criança</button>
  </div>
</header>

<section class="tools">
  <div class="searchbox"><span>🔎</span><input id="q" type="search" placeholder="Buscar por nome..." oninput="setFilters()"></div>
  <select class="fsel" id="f-status" onchange="setFilters()"><option value="all">Todos os status</option></select>
  <select class="fsel" id="f-cat" onchange="setFilters()"><option value="all">Todas categorias</option></select>
  <div class="segment">
    <button class="seg active" id="view-cat" onclick="setView('cat')">Categorias</button>
    <button class="seg" id="view-status" onclick="setView('status')">Status</button>
  </div>
</section>

<div class="board" id="board"></div>

<button class="fab" onclick="toggleSheet()" aria-label="Adicionar">＋</button>
<div class="sheet-ov" id="sheet-ov" onclick="sheetClick(event)">
  <div class="sheet">
    <div class="sheet-grab"></div>
    <button class="sheet-btn p" onclick="sheetGo('adult')">👤 <span>Adicionar adulto</span></button>
    <button class="sheet-btn" onclick="sheetGo('child')">👶 <span>Adicionar criança</span></button>
    <button class="sheet-btn" onclick="sheetGo('category')">🏷️ <span>Nova categoria</span></button>
    <div class="sheet-div"></div>
    <button class="sheet-btn" style="background:linear-gradient(135deg,#FFF7ED,#FEF3C7);border:1.5px solid #FED7AA;color:#C2410C;font-weight:800" onclick="closeSheet();exportPartyListHTML()">🦁 <span>Lista da Festa (Banda Animal)</span></button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-title" id="mtitle"></div>
    <div id="mbody"></div>
    <div class="modal-ft">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-p" id="mok" onclick="confirmModal()">OK</button>
    </div>
  </div>
</div>
<div id="notif"></div>

<script>
const FB_CONFIG = {
  apiKey:            "AIzaSyDpfFCbuxji7lCYPgpr0uUQUSuhX8IDmLE",
  authDomain:        "lista-vicente.firebaseapp.com",
  projectId:         "lista-vicente",
  storageBucket:     "lista-vicente.firebasestorage.app",
  messagingSenderId: "392963251344",
  appId:             "1:392963251344:web:76b425839e53084c840c15"
};
const FB_ON = FB_CONFIG.apiKey !== 'COLE_SUA_API_KEY';

const PAL=['#6366F1','#EC4899','#F59E0B','#10B981','#3B82F6','#8B5CF6','#EF4444','#0EA5E9','#F97316','#84CC16'];
const STATUS=[
  {id:'pendente',  label:'Pendente',  color:'#D9A441'},
  {id:'confirmado',label:'Confirmado',color:'#3FA980'},
  {id:'talvez',    label:'Talvez',    color:'#6B79E0'},
  {id:'nao_vai',   label:'Não vai',   color:'#D58C8C'}
];
const INIT={
  categories:[
    {id:'cat1',name:'Parentes Evelin',color:'#EC4899'},
    {id:'cat2',name:'Parentes Bruno', color:'#3B82F6'},
    {id:'cat3',name:'Amigos Evelin',  color:'#10B981'},
    {id:'cat4',name:'Amigos Bruno',   color:'#F59E0B'},
    {id:'cat0',name:'Sem Categoria',  color:'#94A3B8'}
  ],
  adults:[
    {id:'a1', name:'Evelin',        catId:'cat0',status:'pendente',childrenIds:[]},
    {id:'a2', name:'Bruno',         catId:'cat0',status:'pendente',childrenIds:[]}
  ],
  children:[]
};

// STATE
const LS_KEY='vp5';
function clone(o){return JSON.parse(JSON.stringify(o))}
function loadLocal(){
  try{
    const s=localStorage.getItem(LS_KEY);
    if(s)return JSON.parse(s);
    const old=localStorage.getItem('vp4');
    if(old){const d=JSON.parse(old);localStorage.setItem(LS_KEY,JSON.stringify(d));return d;}
    return clone(INIT);
  }catch{return clone(INIT);}
}
function migrate(s){
  if(!s||!Array.isArray(s.adults)||!Array.isArray(s.children)||!Array.isArray(s.categories))return clone(INIT);
  s.adults.forEach(a=>{
    if(!a.childrenIds)a.childrenIds=[];
    if(!a.status)a.status='pendente';
    // limpa campos antigos removidos (whatsapp, restrição, observações)
    delete a.phone;delete a.food;delete a.notes;
  });
  s.children.forEach(c=>{if(!c.parentIds)c.parentIds=[];});
  return s;
}
let S=migrate(loadLocal());
let filters={q:'',status:'all',cat:'all'};
let viewMode='cat';
let drag=null;

function saveLocal(){try{localStorage.setItem(LS_KEY,JSON.stringify(S));}catch{}}
function uid(){return '_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function norm(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'')}
function statusInfo(id){return STATUS.find(s=>s.id===id)||STATUS[0]}
function catById(id){return S.categories.find(c=>c.id===id)||S.categories.find(c=>c.id==='cat0')||S.categories[0]}
function adultById(id){return S.adults.find(a=>a.id===id)}
function childById(id){return S.children.find(c=>c.id===id)}

// FIREBASE
let db=null,docRef=null,_fbWritePending=false,_fbDebounce;
if(FB_ON){
  try{
    firebase.initializeApp(FB_CONFIG);
    db=firebase.firestore();
    db.enablePersistence().catch(()=>{});
    docRef=db.collection('festa').doc('vicente');
    docRef.onSnapshot(snap=>{
      if(!snap.exists)return;
      if(_fbWritePending)return;
      const remote=migrate(snap.data());
      if(JSON.stringify(remote)!==JSON.stringify(S)){S=remote;saveLocal();renderAll();}
      setSyncSt('ok','Sincronizado');
    },()=>setSyncSt('err','Erro de conexão'));
    setSyncSt('syncing','Conectando...');
  }catch(e){setSyncSt('err','Firebase inválido');console.error(e)}
}
function syncToFB(){
  if(!FB_ON||!docRef)return;
  setSyncSt('syncing','Salvando...');_fbWritePending=true;clearTimeout(_fbDebounce);
  _fbDebounce=setTimeout(async()=>{
    try{await docRef.set(S);setSyncSt('ok','Sincronizado');}
    catch(e){setSyncSt('err','Erro ao salvar');console.error(e);}
    finally{setTimeout(()=>{_fbWritePending=false;},800);}
  },1000);
}
function setSyncSt(type,msg){const el=document.getElementById('sync-st');if(!el)return;el.className='sync-st '+type;el.textContent={ok:'● '+msg,syncing:'⟳ '+msg,err:'✕ '+msg}[type]||msg}
function save(){saveLocal();syncToFB();}

// GROUPS (agrupa adultos que compartilham os mesmos filhos)
function getGroups(catId){
  const list=S.adults.filter(a=>a.catId===catId);
  const byId=Object.fromEntries(list.map(a=>[a.id,a]));
  const done=new Set(),out=[];
  for(const a of list){
    if(done.has(a.id))continue;
    const stack=[a],members=[];done.add(a.id);
    while(stack.length){
      const cur=stack.pop();members.push(cur);
      if(cur.partnerId&&byId[cur.partnerId]&&!done.has(cur.partnerId)){done.add(cur.partnerId);stack.push(byId[cur.partnerId]);}
      const kids=cur.childrenIds||[];
      if(kids.length){
        for(const b of list){
          if(done.has(b.id))continue;
          if((b.childrenIds||[]).some(k=>kids.includes(k))){done.add(b.id);stack.push(byId[b.id]);}
        }
      }
    }
    const childIds=[...new Set(members.flatMap(m=>m.childrenIds||[]))];
    if(members.length<2)out.push({type:'solo',adult:members[0],members:[members[0]],childIds});
    else{
      const isCouple=members.length===2&&members[0].partnerId===members[1].id&&members[1].partnerId===members[0].id;
      out.push({type:'group',members,childIds,isCouple});
    }
  }
  return out;
}
function allGroups(){return S.categories.flatMap(c=>getGroups(c.id).map(g=>({...g,catId:c.id})))}
function groupText(g){
  const members=g.members||[g.adult];
  const kids=(g.childIds||[]).map(childById).filter(Boolean);
  const cat=catById(members[0]?.catId);
  return norm([members.map(a=>a.name).join(' '),kids.map(c=>c.name+' '+c.age).join(' '),cat?.name].join(' '));
}
function groupVisible(g){
  const members=g.members||[g.adult];
  if(filters.cat!=='all'&&members[0]?.catId!==filters.cat)return false;
  if(filters.status!=='all'&&!members.some(a=>(a.status||'pendente')===filters.status))return false;
  if(filters.q&&!groupText(g).includes(norm(filters.q)))return false;
  return true;
}
function childVisible(c){
  const parents=S.adults.filter(a=>(a.childrenIds||[]).includes(c.id));
  if(filters.cat!=='all'&&!parents.some(a=>a.catId===filters.cat))return false;
  if(filters.status!=='all'&&!parents.some(a=>(a.status||'pendente')===filters.status))return false;
  const txt=norm([c.name,c.age,parents.map(a=>a.name).join(' ')].join(' '));
  if(filters.q&&!txt.includes(norm(filters.q)))return false;
  return true;
}
function hasActiveFilters(){return !!(filters.q||filters.status!=='all'||filters.cat!=='all')}

// RENDER
function renderACard(a,showKids=true,canDrag=true){
  const st=statusInfo(a.status);
  const kids=showKids?(a.childrenIds||[]).map(childById).filter(Boolean):[];
  const kHtml=kids.length?`<div class="kids-sub">↳ ${esc(kids.map(c=>c.name).join(', '))}</div>`:'';
  const dragAttrs=canDrag?`draggable="true" ondragstart="dStart(event,'adult','${a.id}')" ondragend="dEnd()"`:`draggable="false"`;
  return `<div class="acard" id="ac-${a.id}" ${dragAttrs}>
    <div class="card-row">
      <span class="st-dot" style="background:${st.color}" title="${st.label}" onclick="cycleStatus(event,'${a.id}')"></span>
      <div class="card-name">${esc(a.name)}</div>
      <span class="st-lbl" onclick="cycleStatus(event,'${a.id}')">${st.label}</span>
      <div class="card-acts">
        <button class="bi" title="Editar" onclick="editAdult(event,'${a.id}')">✏</button>
        <button class="bi d" title="Remover" onclick="delAdult(event,'${a.id}')">✕</button>
      </div>
    </div>
    ${kHtml}
  </div>`;
}
function renderFGroup(g){
  const mids=g.members.map(m=>m.id).join(',');
  const kids=g.childIds.map(childById).filter(Boolean);
  const kidsRow=kids.length?`<div class="fgroup-children">↳ ${esc(kids.map(c=>c.name+(c.age?' ('+c.age+')':'')).join(', '))}</div>`:'';
  const label=g.isCouple?(kids.length?'Casal · pais':'Casal'):'Família';
  const unc=g.isCouple?`<button class="bi fg-x" title="Desfazer casal" onclick="uncouple(event,'${g.members[0].id}')">✕</button>`:'';
  return `<div class="fgroup ${g.isCouple?'is-couple':'is-family'}" id="fg-${g.members[0].id}">
    <div class="fgroup-hdr" draggable="true" ondragstart="fgroupStart(event,'${mids}')" ondragend="dEnd()">${label}${unc}<small>arrastar</small></div>
    <div class="fgroup-parents">${g.members.map(m=>renderACard(m,false,false)).join('')}</div>
    ${kidsRow}
  </div>`;
}
function renderCol(cat){
  const grps=getGroups(cat.id).filter(groupVisible);
  const allCnt=S.adults.filter(a=>a.catId===cat.id).length;
  const visCnt=grps.reduce((s,g)=>s+(g.members?g.members.length:1),0);
  const body=grps.length?grps.map(g=>g.type==='solo'?renderACard(g.adult):renderFGroup(g)).join(''):`<div class="empty-col">${hasActiveFilters()?'Nenhum resultado':'Arraste convidados aqui'}</div>`;
  const sys=cat.id==='cat0';
  const btns=sys?'':`<button class="bi" onclick="editCat(event,'${cat.id}')" title="Editar">✏</button><button class="bi d" onclick="delCat(event,'${cat.id}')" title="Excluir">✕</button>`;
  return `<div class="col" id="col-${cat.id}" style="border-top:3px solid ${cat.color}">
    <div class="col-hdr" onclick="toggleCol(event,'${cat.id}')"><span class="col-dot" style="background:${cat.color}"></span><div class="col-name" style="color:${cat.color}">${esc(cat.name)}</div><div class="col-cnt" style="color:${cat.color};background:${cat.color}14;border-color:${cat.color}55">${hasActiveFilters()?visCnt+'/'+allCnt:allCnt}</div>${btns}<span class="col-chev">▾</span></div>
    <div class="col-body" id="cb-${cat.id}" ondragover="colOver(event,'${cat.id}')" ondragleave="colLeave(event,'${cat.id}')" ondrop="colDrop(event,'${cat.id}')">${body}</div>
    <div class="col-ft"><button class="btn-ac" data-cat="${cat.id}" ondragover="btnAcOver(event,'${cat.id}')" ondragleave="btnAcLeave(event)" ondrop="btnAcDrop(event,'${cat.id}')" onclick="openModal('adult','${cat.id}')">＋ Adulto</button></div>
  </div>`;
}
function renderStatusCol(st){
  const grps=allGroups().filter(g=>groupVisible(g)&&g.members.some(a=>(a.status||'pendente')===st.id));
  const cnt=S.adults.filter(a=>(a.status||'pendente')===st.id).length;
  const body=grps.length?grps.map(g=>g.type==='solo'?renderACard(g.adult):renderFGroup(g)).join(''):`<div class="empty-col">Nenhum convidado</div>`;
  return `<div class="col col-status" id="col-status-${st.id}" style="border-top:4px solid ${st.color};background:${st.color}0a">
    <div class="col-hdr" style="background:${st.color}16;border-bottom-color:${st.color}3a" onclick="toggleCol(event,'status-${st.id}')"><span class="col-dot" style="background:${st.color};width:11px;height:11px"></span><div class="col-name" style="color:${st.color}">${st.label}</div><div class="col-cnt" style="color:${st.color};background:${st.color}22;border-color:${st.color}66">${cnt}</div><span class="col-chev">▾</span></div>
    <div class="col-body" id="sb-${st.id}" ondragover="statusOver(event,'${st.id}')" ondragleave="statusLeave(event,'${st.id}')" ondrop="statusDrop(event,'${st.id}')">${body}</div>
  </div>`;
}
function renderChildCol(){
  const visible=S.children.filter(childVisible);
  const cards=visible.map(c=>{
    const pn=S.adults.filter(a=>(a.childrenIds||[]).includes(c.id)).map(a=>a.name);
    const pt=pn.length?`↳ Filho(a) de ${pn.join(' e ')}`:'↳ Sem pais · arraste para um adulto';
    return `<div class="ccard" id="cc-${c.id}" draggable="true" ondragstart="dStart(event,'child','${c.id}')" ondragend="dEnd()">
      <div class="card-row">
        <span class="st-dot" style="background:var(--green)"></span>
        <div class="card-name">${esc(c.name)}</div>
        <span class="child-age">${esc(c.age)}</span>
        <div class="card-acts"><button class="bi" title="Editar" onclick="editChild(event,'${c.id}')">✏</button><button class="bi d" title="Remover" onclick="delChild(event,'${c.id}')">✕</button></div>
      </div><div class="child-parents">${esc(pt)}</div>
    </div>`;
  }).join('')||`<div class="empty-col">${hasActiveFilters()?'Nenhuma criança encontrada':'Nenhuma criança'}</div>`;
  return `<div class="col" id="col-children" style="border-top:3px solid var(--green)">
    <div class="col-hdr" onclick="toggleCol(event,'children')"><span class="col-dot" style="background:var(--green)"></span><div class="col-name" style="color:#2E8B6B">Crianças</div><div class="col-cnt" style="color:#2E8B6B;background:#3FA98016;border-color:#3FA98055">${visible.length}/${S.children.length}</div><span class="col-chev">▾</span></div>
    <div class="col-body" id="cb-children">${cards}</div>
    <div class="col-ft"><button class="btn-ac" onclick="openModal('child')">＋ Criança</button></div>
  </div>`;
}
function render(){
  const b=document.getElementById('board');
  if(viewMode==='cat')b.innerHTML=S.categories.map(renderCol).join('')+renderChildCol()+`<button class="btn-newcol" onclick="openModal('category')">＋ Nova Categoria</button>`;
  else b.innerHTML=STATUS.map(renderStatusCol).join('')+renderChildCol();
  document.getElementById('hA').textContent=S.adults.length;
  document.getElementById('hC').textContent=S.children.length;
  document.getElementById('hT').textContent=S.adults.length+S.children.length;
}
function renderControls(){
  document.getElementById('f-status').innerHTML=`<option value="all">Todos os status</option>`+STATUS.map(s=>`<option value="${s.id}">${s.label}</option>`).join('');
  document.getElementById('f-cat').innerHTML=`<option value="all">Todas categorias</option>`+S.categories.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');
  document.getElementById('f-status').value=filters.status;
  document.getElementById('f-cat').value=filters.cat;
  document.getElementById('q').value=filters.q;
}
function renderAll(){renderControls();render();}

// FILTERS / VIEW
function setFilters(){filters.q=document.getElementById('q').value.trim();filters.status=document.getElementById('f-status').value;filters.cat=document.getElementById('f-cat').value;render()}
function setView(v){viewMode=v;document.getElementById('view-cat').classList.toggle('active',v==='cat');document.getElementById('view-status').classList.toggle('active',v==='status');render()}

// STATUS DRAG
function statusOver(e,statusId){
  if(!drag)return;e.preventDefault();e.stopPropagation();clearMarks();
  if(drag.type==='child'){document.elementFromPoint(e.clientX,e.clientY)?.closest('.acard')?.classList.add('child-hover');return;}
  document.getElementById('sb-'+statusId)?.classList.add('dover');
}
function statusLeave(e,statusId){const el=document.getElementById('sb-'+statusId);if(el&&!el.contains(e.relatedTarget))el.classList.remove('dover')}
function statusDrop(e,statusId){
  e.preventDefault();e.stopPropagation();if(!drag)return;
  if(drag.type==='child'){const el=document.elementFromPoint(e.clientX,e.clientY)?.closest('.acard');clearMarks();if(el)linkChild(drag.id,el.id.replace('ac-',''));return;}
  const ids=drag.type==='group'?drag.ids:[drag.id];
  ids.forEach(id=>{const a=adultById(id);if(a)a.status=statusId;});
  clearMarks();save();render();notify('Status: '+statusInfo(statusId).label);
}

// MOUSE D&D
function dStart(e,type,id){drag={type,id};e.dataTransfer.effectAllowed='move';setTimeout(()=>{document.getElementById((type==='adult'?'ac-':'cc-')+id)?.classList.add('dragging');if(type==='child')document.querySelectorAll('.acard').forEach(el=>el.classList.add('child-mode'));},0)}
function dEnd(){clearMarks();document.querySelectorAll('.dragging,.child-mode').forEach(el=>el.classList.remove('dragging','child-mode'));drag=null}
function btnAcOver(e,catId){if(!drag||drag.type==='child')return;e.preventDefault();e.stopPropagation();e.currentTarget.classList.add('dover-ac')}
function btnAcLeave(e){e.currentTarget.classList.remove('dover-ac')}
function btnAcDrop(e,catId){e.currentTarget.classList.remove('dover-ac');colDrop(e,catId)}
function fgroupStart(e,idsStr){drag={type:'group',ids:idsStr.split(',')};e.dataTransfer.effectAllowed='move';e.stopPropagation();setTimeout(()=>e.target.closest('.fgroup')?.classList.add('dragging'),0)}
function setAdultCat(a,catId){a.catId=catId;if(a.partnerId){const p=adultById(a.partnerId);if(p)p.catId=catId;}}

// blocos (cards/grupos) de topo de uma coluna + marcas visuais
function colBlocks(cb){return [...cb.children].filter(el=>el.classList.contains('acard')||el.classList.contains('fgroup'))}
function blockFirstAdultId(el){if(el.classList.contains('acard'))return el.id.replace('ac-','');const inner=el.querySelector('.acard');return inner?inner.id.replace('ac-',''):null}
function clearMarks(){document.querySelectorAll('.child-hover,.dover,.dover-ac,.dover-couple,.ins-before,.ins-after').forEach(el=>el.classList.remove('child-hover','dover','dover-ac','dover-couple','ins-before','ins-after'))}

let dndAction=null;
function resolveDrop(catId,x,y){
  clearMarks();dndAction=null;
  const cb=document.getElementById('cb-'+catId);if(!cb||!drag)return;
  const overCard=document.elementFromPoint(x,y)?.closest('.acard');
  if(drag.type==='child'){
    if(overCard){overCard.classList.add('child-hover');dndAction={kind:'child',aid:overCard.id.replace('ac-','')};}
    return;
  }
  // zona de casal: centro de outro card, ambos sem parceiro
  if(drag.type==='adult'&&overCard&&overCard.id!=='ac-'+drag.id){
    const aid=overCard.id.replace('ac-','');const a=adultById(drag.id),b=adultById(aid);const r=overCard.getBoundingClientRect();
    if(a&&b&&!a.partnerId&&!b.partnerId&&y>r.top+r.height*0.3&&y<r.bottom-r.height*0.3){
      overCard.classList.add('dover-couple');dndAction={kind:'couple',aid};return;
    }
  }
  // reordenar / inserir na posição
  const blocks=colBlocks(cb);
  let idx=blocks.length;
  for(let i=0;i<blocks.length;i++){const r=blocks[i].getBoundingClientRect();if(y<r.top+r.height/2){idx=i;break;}}
  const beforeId=idx<blocks.length?blockFirstAdultId(blocks[idx]):null;
  dndAction={kind:'insert',catId,beforeId};
  if(idx<blocks.length)blocks[idx].classList.add('ins-before');
  else if(blocks.length)blocks[blocks.length-1].classList.add('ins-after');
  else cb.classList.add('dover');
}
function moveAdults(ids,catId,beforeId){
  const movingSet=new Set(ids);
  const moving=ids.map(adultById).filter(Boolean);
  if(!moving.length)return;
  S.adults=S.adults.filter(a=>!movingSet.has(a.id));
  moving.forEach(a=>a.catId=catId);
  let insertAt;
  if(beforeId&&!movingSet.has(beforeId)){const i=S.adults.findIndex(a=>a.id===beforeId);insertAt=i<0?S.adults.length:i;}
  else{let last=-1;for(let i=0;i<S.adults.length;i++)if(S.adults[i].catId===catId)last=i;insertAt=last<0?S.adults.length:last+1;}
  S.adults.splice(insertAt,0,...moving);
}
function applyDrop(){
  if(!drag||!dndAction)return false;
  if(dndAction.kind==='child'){linkChild(drag.id,dndAction.aid);return true;}
  if(dndAction.kind==='couple'){
    const a=adultById(drag.id),b=adultById(dndAction.aid);
    if(a&&b&&!a.partnerId&&!b.partnerId&&confirm(`Formar casal: ${a.name} e ${b.name}?`)){a.partnerId=b.id;b.partnerId=a.id;a.catId=b.catId;save();render();notify(`${a.name} e ${b.name} formam um casal`);}
    return true;
  }
  if(dndAction.kind==='insert'){
    const ids=drag.type==='group'?drag.ids:[drag.id];
    if(dndAction.beforeId&&ids.includes(dndAction.beforeId))return true; // soltou sobre si mesmo: sem efeito
    const first=adultById(ids[0]);const changed=first&&first.catId!==dndAction.catId;
    moveAdults(ids,dndAction.catId,dndAction.beforeId);
    save();render();notify(changed?('Movido para '+(catById(dndAction.catId)?.name||'')):'Reorganizado');
    return true;
  }
  return false;
}
function colOver(e,catId){if(!drag)return;e.preventDefault();e.stopPropagation();resolveDrop(catId,e.clientX,e.clientY)}
function colLeave(e,catId){const cb=document.getElementById('cb-'+catId);if(cb&&!cb.contains(e.relatedTarget))clearMarks()}
function colDrop(e,catId){e.preventDefault();e.stopPropagation();if(!drag)return;resolveDrop(catId,e.clientX,e.clientY);applyDrop();clearMarks()}

// TOUCH D&D
let tD=null,tCl=null,_tdActive=null;
function _tCleanup(){if(_tdActive){document.removeEventListener('touchmove',_tdActive);_tdActive=null;}}
function _tActivate(){
  if(_tdActive)return;
  _tdActive=function(e){
    if(!tD||!tD.active){_tCleanup();return;}
    e.preventDefault();
    const t=e.touches[0];
    if(tCl){tCl.style.top=(t.clientY-tD.oy)+'px';tCl.style.left=(t.clientX-tD.ox)+'px';tCl.style.display='none';}
    const under=document.elementFromPoint(t.clientX,t.clientY);
    if(tCl)tCl.style.display='';
    const sv=drag;drag=tD;
    const cb=under?.closest('.col-body');
    if(cb&&cb.id.indexOf('cb-')===0&&cb.id!=='cb-children'){resolveDrop(cb.id.replace('cb-',''),t.clientX,t.clientY);}
    else if(cb&&cb.id.indexOf('sb-')===0){clearMarks();cb.classList.add('dover');if(tD.type==='child')under?.closest('.acard')?.classList.add('child-hover');}
    else{clearMarks();under?.closest('.btn-ac')?.classList.add('dover-ac');}
    drag=sv;
  };
  document.addEventListener('touchmove',_tdActive,{passive:false});
}
function _tStart(el,t,tDObj){
  tD=tDObj;
  tD.timer=setTimeout(()=>{
    if(!tD)return;tD.active=true;
    const r=el.getBoundingClientRect();
    tCl=el.cloneNode(true);tCl.id='tclone';
    tCl.style.cssText=`width:${r.width}px;top:${r.top}px;left:${r.left}px`;
    document.body.appendChild(tCl);el.style.opacity='.35';
    tD.ox=t.clientX-r.left;tD.oy=t.clientY-r.top;
    if(tD.type==='child')document.querySelectorAll('.acard').forEach(c=>c.classList.add('child-mode'));
    _tActivate();
  },220);
}
document.addEventListener('touchstart',e=>{
  if(e.touches.length!==1)return;
  const t=e.touches[0];
  const fhdr=e.target.closest('.fgroup-hdr');
  if(fhdr&&!e.target.closest('.bi')){
    const fg=fhdr.closest('.fgroup');if(!fg)return;
    const ids=[...fg.querySelectorAll('.acard')].map(c=>c.id.replace('ac-',''));
    _tStart(fg,t,{type:'group',ids,sx:t.clientX,sy:t.clientY,active:false,card:fg});
    return;
  }
  const card=e.target.closest('.acard,.ccard');
  if(!card||e.target.closest('.bi,.btn-ac,.st-dot,.st-lbl'))return;
  if(card.classList.contains('acard')&&card.closest('.fgroup-parents'))return;
  const isA=card.classList.contains('acard');
  const id=card.id.replace(isA?'ac-':'cc-','');
  _tStart(card,t,{type:isA?'adult':'child',id,sx:t.clientX,sy:t.clientY,active:false,card});
},{passive:true});
document.addEventListener('touchmove',e=>{
  if(!tD||tD.active)return;
  const t=e.touches[0];
  if(Math.abs(t.clientX-tD.sx)>10||Math.abs(t.clientY-tD.sy)>10){clearTimeout(tD.timer);_tCleanup();tD=null;}
},{passive:true});
document.addEventListener('touchend',e=>{
  _tCleanup();
  if(!tD)return;clearTimeout(tD.timer);
  if(!tD.active){tD=null;return;}
  const t=e.changedTouches[0];
  if(tCl){document.body.removeChild(tCl);tCl=null;}
  if(tD.card)tD.card.style.opacity='';
  const under=document.elementFromPoint(t.clientX,t.clientY);
  const sv=drag;drag=tD;
  const cb=under?.closest('.col-body'),bac=under?.closest('.btn-ac');
  if(cb&&cb.id.indexOf('sb-')===0){
    const statusId=cb.id.replace('sb-','');
    if(tD.type==='child'){const el=under?.closest('.acard');if(el)linkChild(tD.id,el.id.replace('ac-',''));}
    else{const ids=tD.type==='group'?tD.ids:[tD.id];ids.forEach(id=>{const a=adultById(id);if(a)a.status=statusId;});save();render();notify('Status: '+statusInfo(statusId).label);}
  }
  else if(bac){const cid=bac.dataset.cat;if(cid){resolveDrop(cid,t.clientX,t.clientY);applyDrop();}}
  else if(cb&&cb.id.indexOf('cb-')===0&&cb.id!=='cb-children'){resolveDrop(cb.id.replace('cb-',''),t.clientX,t.clientY);applyDrop();}
  drag=sv;
  document.querySelectorAll('.child-mode').forEach(el=>el.classList.remove('child-mode'));clearMarks();
  tD=null;
},{passive:true});

function linkChild(cid,aid){const a=adultById(aid),c=childById(cid);if(!a||!c)return;if(!a.childrenIds)a.childrenIds=[];if(!c.parentIds)c.parentIds=[];if(!a.childrenIds.includes(cid))a.childrenIds.push(cid);if(!c.parentIds.includes(aid))c.parentIds.push(aid);save();render();notify(`${c.name} vinculado(a) a ${a.name}`)}
function cycleStatus(e,id){e.stopPropagation();const a=adultById(id);if(!a)return;const idx=STATUS.findIndex(s=>s.id===(a.status||'pendente'));a.status=STATUS[(idx+1)%STATUS.length].id;save();render();notify(`${a.name}: ${statusInfo(a.status).label}`)}
function uncouple(e,id){e.stopPropagation();const a=adultById(id);if(!a||!a.partnerId)return;const p=adultById(a.partnerId);if(!confirm(`Desfazer casal${p?' de '+a.name+' e '+p.name:''}?`))return;if(p)delete p.partnerId;delete a.partnerId;save();render();notify('Casal desfeito')}

    <div class="field"><label class="lbl">Idade</label><input class="inp" id="mi-age" value="${esc(c.age)}" placeholder="Ex: 5 anos, 3 meses"></div>
    <div class="form-grid"><div class="field"><label class="lbl">Pai / Mãe 1</label><select class="sel" id="mi-p1">${optsFor(parents[0]||'')}</select></div><div class="field"><label class="lbl">Pai / Mãe 2</label><select class="sel" id="mi-p2">${optsFor(parents[1]||'')}</select></div></div>`;

function confirmModal(){
  const t=mCtx.type;
  if(t==='adult'||t==='editAdult'){
    const name=document.getElementById('mi-name').value.trim(),catId=document.getElementById('mi-cat').value,status=document.getElementById('mi-status').value;
    if(!name){notify('Informe o nome','err');return}
    if(t==='adult'){S.adults.push({id:uid(),name,catId,status,childrenIds:[]});notify(`${name} adicionado(a)`);}
    else{const a=adultById(mCtx.arg);if(a){a.name=name;a.status=status;setAdultCat(a,catId);}notify('Convidado atualizado');}
    save();closeModal();renderAll();
  }else if(t==='child'||t==='editChild'){
    const name=document.getElementById('mi-name').value.trim(),age=document.getElementById('mi-age').value.trim(),p1=document.getElementById('mi-p1').value,p2=document.getElementById('mi-p2').value;
    if(!name){notify('Informe o nome','err');return}
    let c;
    if(t==='child'){c={id:uid(),name,age,parentIds:[]};S.children.push(c);notify(`${name} adicionado(a)`);}
    else{c=childById(mCtx.arg);if(!c)return;S.adults.forEach(a=>{a.childrenIds=(a.childrenIds||[]).filter(k=>k!==c.id);});c.name=name;c.age=age;notify('Criança atualizada');}
    const pids=[...new Set([p1,p2].filter(Boolean))];c.parentIds=pids;
    pids.forEach(pid=>{const a=adultById(pid);if(a){if(!a.childrenIds)a.childrenIds=[];if(!a.childrenIds.includes(c.id))a.childrenIds.push(c.id);}});
    save();closeModal();renderAll();
  }else if(t==='category'||t==='editCategory'){
    const name=document.getElementById('mi-catname').value.trim(),color=document.getElementById('mi-color').value;
    if(!name){notify('Informe o nome','err');return}
    if(t==='category'){S.categories.push({id:uid(),name,color});notify(`"${name}" criada`);}
    else{const cat=catById(mCtx.arg);if(cat){cat.name=name;cat.color=color;}notify('Categoria atualizada');}
    save();closeModal();renderAll();
  }
}
document.addEventListener('keydown',e=>{if(!document.getElementById('overlay').classList.contains('open'))return;if(e.key==='Escape')closeModal();else if(e.key==='Enter'&&e.target.tagName!=='SELECT')confirmModal();});

function notify(msg,type='ok'){const el=document.getElementById('notif');el.textContent=msg;el.className=type+' show';clearTimeout(window._nt);window._nt=setTimeout(()=>el.classList.remove('show'),3000)}

renderAll();
</script>
</body>
</html>
